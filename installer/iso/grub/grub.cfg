# InterGenOS ISO — ESP-side grub.cfg
#
# Loaded by the standalone signed GRUB binary (packages/core/grub/embedded-grub.cfg)
# after ESP discovery. This is the user-facing 3-entry menu.
#
# Path on ESP: /EFI/InterGenOS/grub.cfg
# Companion UKI: /EFI/InterGenOS/igos-live.efi (signed by InterGenOS CA)
#
# The three menu entries point at the same UKI but pass different `igos.mode=`
# kernel cmdline values. Custom 100-line /init in the UKI's initramfs reads
# `igos.mode=` and dispatches:
#   - live         → boot live GNOME desktop (liveuser autologin via GDM)
#   - install-gui  → auto-launch Forge GUI installer (skips GNOME shell)
#   - install-tui  → auto-launch Forge TUI declarative-builder on tty1

set timeout=10
set default=0

# Theme (FLUX-generated splash; placeholder until Phase D branding drops)
if [ -e /EFI/InterGenOS/themes/intergenos/theme.txt ]; then
    set theme=/EFI/InterGenOS/themes/intergenos/theme.txt
fi

# Load gfx + font support for the theme (required for gfxmenu rendering)
loadfont /EFI/InterGenOS/fonts/unicode.pf2
insmod gfxterm
insmod png
terminal_output gfxterm

menuentry "Try InterGenOS" --class igos --class live {
    linux /EFI/InterGenOS/igos-live.efi igos.mode=live quiet splash
}

menuentry "Install InterGenOS (Graphical)" --class igos --class install-gui {
    linux /EFI/InterGenOS/igos-live.efi igos.mode=install-gui quiet splash
}

menuentry "Install InterGenOS (Text)" --class igos --class install-tui {
    linux /EFI/InterGenOS/igos-live.efi igos.mode=install-tui
}

submenu "Advanced options" {
    menuentry "Boot from first hard disk" {
        exit
    }
    menuentry "UEFI firmware setup" --class efi-firmware {
        fwsetup
    }
}
