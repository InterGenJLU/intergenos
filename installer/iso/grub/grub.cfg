# InterGenOS ISO — ESP-side grub.cfg
#
# Loaded by the standalone signed GRUB binary (packages/core/grub/embedded-grub.cfg)
# after ESP discovery (`search --label IGOS_ESP`). This is the user-facing
# 3-entry menu.
#
# Path on ESP: /EFI/InterGenOS/grub.cfg
# Companion UKIs (all signed by InterGenOS CA, all on the ESP):
#   /EFI/InterGenOS/igos-live.efi         — live GNOME desktop
#   /EFI/InterGenOS/igos-install-gui.efi  — Forge GUI installer
#   /EFI/InterGenOS/igos-install-tui.efi  — Forge TUI declarative-builder
#
# Each menu entry chainloads the appropriate UKI. The boot-mode is encoded
# in each UKI's sealed `.cmdline` section (igos.mode=...), NOT in this
# grub.cfg — so an attacker editing this config cannot switch a user from
# `live` to `install-tui` or otherwise alter boot behavior. The UKI
# signature covers the cmdline.

set timeout=10
set default=0

# Theme (FLUX-generated splash; placeholder until Phase D branding drops)
if [ -e /EFI/InterGenOS/themes/intergenos/theme.txt ]; then
    set theme=/EFI/InterGenOS/themes/intergenos/theme.txt
fi

# Load gfx + font support for the theme (required for gfxmenu rendering)
loadfont /EFI/InterGenOS/fonts/unicode.pf2
insmod gfxterm
insmod png
terminal_output gfxterm

menuentry "Try InterGenOS" --class igos --class live {
    chainloader /EFI/InterGenOS/igos-live.efi
}

menuentry "Install InterGenOS (Graphical)" --class igos --class install-gui {
    chainloader /EFI/InterGenOS/igos-install-gui.efi
}

menuentry "Install InterGenOS (Text)" --class igos --class install-tui {
    chainloader /EFI/InterGenOS/igos-install-tui.efi
}

submenu "Advanced options" {
    menuentry "Boot from first hard disk" {
        exit
    }
    menuentry "UEFI firmware setup" --class efi-firmware {
        fwsetup
    }
}
