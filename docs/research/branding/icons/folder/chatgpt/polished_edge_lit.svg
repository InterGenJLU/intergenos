<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
 <defs>
  <!-- Glass body gradient (slight transparency, lighter at top) -->
  <linearGradient id="glass" x1="0" y1="0" x2="0.2" y2="1">
   <stop offset="0%" stop-color="#141e35" stop-opacity="0.92"/>
   <stop offset="40%" stop-color="#0e1628" stop-opacity="0.95"/>
   <stop offset="100%" stop-color="#080c18" stop-opacity="0.98"/>
  </linearGradient>

  <!-- Back panel (slightly darker, visible behind tab area) -->
  <linearGradient id="backPanel" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0%" stop-color="#0c1222"/>
   <stop offset="100%" stop-color="#070a14"/>
  </linearGradient>

  <!-- Diagonal gloss reflection -->
  <linearGradient id="gloss" x1="0" y1="0" x2="0.7" y2="0.8">
   <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
   <stop offset="25%" stop-color="#ffffff" stop-opacity="0.04"/>
   <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>

  <!-- Wide soft glow filter -->
  <filter id="wideGlow" x="-60%" y="-60%" width="220%" height="220%">
   <feGaussianBlur stdDeviation="7" result="blur"/>
   <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
   </feMerge>
  </filter>

  <!-- Medium glow -->
  <filter id="medGlow" x="-40%" y="-40%" width="180%" height="180%">
   <feGaussianBlur stdDeviation="4" result="blur"/>
   <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
   </feMerge>
  </filter>

  <!-- Folder shape path -->
  <!-- Reusable as a def so we don't repeat coordinates -->
 </defs>

 <!-- ============================================ -->
 <!-- Layer 1: Wide ambient glow (soft, bright) -->
 <!-- ============================================ -->
 <path d="M32 72 Q32 56 48 56 H104 Q112 56 120 64 L132 76 H208
          Q224 76 224 92 V184 Q224 200 208 200 H48 Q32 200 32 184 Z"
   fill="none"
   stroke="#0099FF"
   stroke-width="5"
   stroke-opacity="0.4"
   filter="url(#wideGlow)"/>

 <!-- ============================================ -->
 <!-- Layer 2: Back panel fill (visible above tab) -->
 <!-- ============================================ -->
 <path d="M32 72 Q32 56 48 56 H104 Q112 56 120 64 L132 76 H208
          Q224 76 224 92 V184 Q224 200 208 200 H48 Q32 200 32 184 Z"
   fill="url(#backPanel)"/>

 <!-- ============================================ -->
 <!-- Layer 3: Front panel (glass body, overlaps lower portion) -->
 <!-- ============================================ -->
 <path d="M32 108 H224 V184 Q224 200 208 200 H48 Q32 200 32 184 Z"
   fill="url(#glass)"/>

 <!-- ============================================ -->
 <!-- Layer 4: Crease highlight (where panels meet) -->
 <!-- ============================================ -->
 <line x1="34" y1="108" x2="222" y2="108"
   stroke="#0099FF" stroke-width="1.5" stroke-opacity="0.4"
   filter="url(#medGlow)"/>

 <!-- ============================================ -->
 <!-- Layer 5: Diagonal glass reflection -->
 <!-- ============================================ -->
 <path d="M32 108 L160 108 L32 190 Z" fill="url(#gloss)"/>

 <!-- ============================================ -->
 <!-- Layer 6: Bottom edge intensification (brightest glow) -->
 <!-- ============================================ -->
 <path d="M48 200 Q32 200 32 184 L32 178"
   fill="none" stroke="#0099FF" stroke-width="3" stroke-opacity="0.5"
   stroke-linecap="round" filter="url(#wideGlow)"/>
 <path d="M48 200 H208 Q224 200 224 184"
   fill="none" stroke="#0099FF" stroke-width="3" stroke-opacity="0.6"
   stroke-linecap="round" filter="url(#wideGlow)"/>
 <path d="M224 184 L224 178"
   fill="none" stroke="#0099FF" stroke-width="3" stroke-opacity="0.5"
   stroke-linecap="round" filter="url(#wideGlow)"/>

 <!-- ============================================ -->
 <!-- Layer 7: Medium glow on the full outline -->
 <!-- ============================================ -->
 <path d="M32 72 Q32 56 48 56 H104 Q112 56 120 64 L132 76 H208
          Q224 76 224 92 V184 Q224 200 208 200 H48 Q32 200 32 184 Z"
   fill="none"
   stroke="#0099FF"
   stroke-width="2"
   stroke-opacity="0.35"
   filter="url(#medGlow)"/>

 <!-- ============================================ -->
 <!-- Layer 8: Sharp structural edge (crisp on top of glow) -->
 <!-- ============================================ -->
 <path d="M32 72 Q32 56 48 56 H104 Q112 56 120 64 L132 76 H208
          Q224 76 224 92 V184 Q224 200 208 200 H48 Q32 200 32 184 Z"
   fill="none"
   stroke="rgba(0,153,255,0.25)"
   stroke-width="1.5"/>

 <!-- ============================================ -->
 <!-- Layer 9: Front panel structural edge -->
 <!-- ============================================ -->
 <path d="M32 108 H224 V184 Q224 200 208 200 H48 Q32 200 32 184 Z"
   fill="none"
   stroke="rgba(0,153,255,0.15)"
   stroke-width="1"/>

 <!-- ============================================ -->
 <!-- Layer 10: Top tab highlight catch -->
 <!-- ============================================ -->
 <path d="M50 57 H102 Q110 57 118 65"
   fill="none" stroke="#ffffff" stroke-width="0.75" stroke-opacity="0.08"
   stroke-linecap="round"/>

</svg>