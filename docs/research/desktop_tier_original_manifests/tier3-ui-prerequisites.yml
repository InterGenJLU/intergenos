# InterGenOS Desktop Tier 3 — UI Toolkit Prerequisites
# Font rendering, Cairo, Pango, GLib ecosystem helpers, image libraries.
# Note: FreeType <-> HarfBuzz circular dep handled via two-pass FreeType build.
# Source: BLFS 13.0

tier: desktop

packages:
  # --- Font rendering (circular dep: freetype <-> harfbuzz) ---
  # Pass 1: FreeType WITHOUT HarfBuzz
  - name: freetype2-pass1
    version: "2.13.3"
    url: https://downloads.sourceforge.net/freetype/freetype-${version}.tar.xz
    license: FTL
    description: "FreeType font rendering library (pass 1 — without HarfBuzz)"
    homepage: https://www.freetype.org/
    build_style: meson
    meson_flags:
      - "-Dharfbuzz=disabled"
      - "-Dbrotli=enabled"
      - "-Dpng=enabled"
    deps:
      build:
        - libpng
        - brotli

  - name: harfbuzz
    version: "10.1.0"
    url: https://github.com/harfbuzz/harfbuzz/releases/download/${version}/harfbuzz-${version}.tar.xz
    license: MIT
    description: Text shaping engine
    homepage: https://harfbuzz.github.io/
    build_style: meson
    meson_flags:
      - "-Dgraphite2=enabled"
      - "-Dicu=enabled"
    deps:
      build:
        - freetype2-pass1
        - graphite2
        - icu

  # Pass 2: FreeType WITH HarfBuzz (rebuild)
  - name: freetype2
    version: "2.13.3"
    url: https://downloads.sourceforge.net/freetype/freetype-${version}.tar.xz
    license: FTL
    description: "FreeType font rendering library (pass 2 — with HarfBuzz)"
    homepage: https://www.freetype.org/
    build_style: meson
    direct_install: true
    meson_flags:
      - "-Dharfbuzz=enabled"
      - "-Dbrotli=enabled"
      - "-Dpng=enabled"
    deps:
      build:
        - harfbuzz
        - libpng
        - brotli

  - name: fontconfig
    version: "2.15.0"
    url: https://www.freedesktop.org/software/fontconfig/release/fontconfig-${version}.tar.xz
    license: MIT
    description: Font configuration and customization library
    homepage: https://www.freedesktop.org/wiki/Software/fontconfig/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--sysconfdir=/etc"
      - "--localstatedir=/var"
      - "--disable-docs"
    deps:
      build:
        - freetype2

  # --- GLib ecosystem helpers ---
  - name: json-glib
    version: "1.10.6"
    url: https://download.gnome.org/sources/json-glib/1.10/json-glib-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: JSON parser for GLib
    homepage: https://wiki.gnome.org/Projects/JsonGlib
    build_style: meson

  - name: shared-mime-info
    version: "2.4"
    url: https://gitlab.freedesktop.org/xdg/shared-mime-info/-/archive/${version}/shared-mime-info-${version}.tar.gz
    license: GPL-2.0-or-later
    description: Core MIME type database
    homepage: https://www.freedesktop.org/wiki/Software/shared-mime-info/
    build_style: meson

  - name: desktop-file-utils
    version: "0.28"
    url: https://www.freedesktop.org/software/desktop-file-utils/releases/desktop-file-utils-${version}.tar.xz
    license: GPL-2.0-or-later
    description: Desktop file validation and installation utilities
    homepage: https://www.freedesktop.org/wiki/Software/desktop-file-utils/
    build_style: meson

  - name: libgudev
    version: "238"
    url: https://download.gnome.org/sources/libgudev/238/libgudev-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: GObject-based wrapper around libudev
    homepage: https://wiki.gnome.org/Projects/libgudev
    build_style: meson

  - name: libxmlb
    version: "0.3.21"
    url: https://github.com/hughsie/libxmlb/releases/download/${version}/libxmlb-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: Library for querying compressed XML metadata
    homepage: https://github.com/hughsie/libxmlb
    build_style: meson
    meson_flags:
      - "-Dgtkdoc=false"
      - "-Dtests=false"

  # --- Cairo and Pango ---
  - name: cairo
    version: "1.18.2"
    url: https://www.cairographics.org/releases/cairo-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: 2D graphics library
    homepage: https://www.cairographics.org/
    build_style: meson
    deps:
      build:
        - fontconfig
        - freetype2
        - libpng
        - libX11
        - libXext
        - libXrender
        - pixman

  - name: pango
    version: "1.54.0"
    url: https://download.gnome.org/sources/pango/1.54/pango-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: Text layout and rendering library
    homepage: https://pango.gnome.org/
    build_style: meson
    deps:
      build:
        - cairo
        - fontconfig
        - freetype2
        - fribidi
        - harfbuzz
        - libX11
        - libXft

  # --- Python bindings ---
  - name: pycairo
    version: "1.27.0"
    url: https://github.com/pygobject/pycairo/releases/download/v${version}/pycairo-${version}.tar.gz
    license: LGPL-2.1-or-later
    description: Python bindings for Cairo
    homepage: https://pycairo.readthedocs.io/
    build_style: meson
    deps:
      build:
        - cairo

  - name: pygobject3
    version: "3.50.0"
    url: https://download.gnome.org/sources/pygobject/3.50/pygobject-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: Python GObject bindings
    homepage: https://pygobject.gnome.org/
    build_style: meson
    deps:
      build:
        - pycairo

  # --- Vala compiler ---
  - name: vala
    version: "0.56.18"
    url: https://download.gnome.org/sources/vala/0.56/vala-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: Vala programming language compiler
    homepage: https://wiki.gnome.org/Projects/Vala
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"

  # --- Higher-level image libraries ---
  - name: dav1d
    version: "1.5.0"
    url: https://code.videolan.org/videolan/dav1d/-/archive/${version}/dav1d-${version}.tar.bz2
    license: BSD-2-Clause
    description: AV1 video decoder
    homepage: https://code.videolan.org/videolan/dav1d
    build_style: meson
    deps:
      build:
        - nasm

  - name: libvpx
    version: "1.15.0"
    url: https://github.com/nickvank/libvpx/archive/v${version}/libvpx-${version}.tar.gz
    license: BSD-3-Clause
    description: VP8/VP9 video codec
    homepage: https://www.webmproject.org/
    build_style: custom
    deps:
      build:
        - nasm

  - name: x264
    version: "20241226"
    url: https://anduin.linuxfromscratch.org/BLFS/x264/x264-${version}.tar.xz
    license: GPL-2.0-or-later
    description: H.264/AVC video encoder
    homepage: https://www.videolan.org/developers/x264.html
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--enable-shared"
      - "--disable-cli"
    deps:
      build:
        - nasm

  - name: x265
    version: "4.1"
    url: https://bitbucket.org/multicoreware/x265_git/downloads/x265_${version}.tar.gz
    license: GPL-2.0-or-later
    description: H.265/HEVC video encoder
    homepage: https://www.x265.org/
    build_style: cmake
    deps:
      build:
        - nasm

  - name: svt-av1
    version: "3.0.0"
    url: https://gitlab.com/AOMediaCodec/SVT-AV1/-/archive/v${version}/SVT-AV1-v${version}.tar.bz2
    license: BSD-2-Clause
    description: SVT-based AV1 encoder
    homepage: https://gitlab.com/AOMediaCodec/SVT-AV1
    build_style: cmake
    deps:
      build:
        - nasm

  - name: fdk-aac
    version: "2.0.3"
    url: https://downloads.sourceforge.net/opencore-amr/fdk-aac-${version}.tar.gz
    license: FDK-AAC
    description: Fraunhofer FDK AAC codec
    homepage: https://sourceforge.net/projects/opencore-amr/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"

  - name: sbc
    version: "2.0"
    url: https://www.kernel.org/pub/linux/bluetooth/sbc-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: Bluetooth SBC audio codec
    homepage: https://www.kernel.org/pub/linux/bluetooth/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"

  - name: soundtouch
    version: "2.3.3"
    url: https://www.surina.net/soundtouch/soundtouch-${version}.tar.gz
    license: LGPL-2.1-or-later
    description: Audio tempo/pitch processing library
    homepage: https://www.surina.net/soundtouch/
    build_style: cmake
