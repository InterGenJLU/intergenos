  - name: libdmx
    version: "1.1.5"
    url: https://www.x.org/pub/individual/lib/libdmx-${version}.tar.xz
    license: MIT
    description: X DMX extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXext

  - name: libpciaccess
    version: "0.18.1"
    url: https://xorg.freedesktop.org/archive/individual/lib/libpciaccess-${version}.tar.xz
    license: MIT
