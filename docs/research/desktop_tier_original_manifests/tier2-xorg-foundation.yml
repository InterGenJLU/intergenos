# InterGenOS Desktop Tier 2a — Xorg Foundation + Individual Libraries
# Expanded from BLFS xorg7-lib meta-package into individual packages.
# Build order is critical — later libraries depend on earlier ones.
# Source: BLFS 13.0 + docs/research/xorg_packages_expanded_2026-04-02.md

tier: desktop

packages:
  # --- Xorg build infrastructure ---
  - name: util-macros
    version: "1.20.2"
    url: https://www.x.org/pub/individual/util/util-macros-${version}.tar.xz
    license: MIT
    description: Xorg autotools macros
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"

  - name: xorgproto
    version: "2024.1"
    url: https://xorg.freedesktop.org/archive/individual/proto/xorgproto-${version}.tar.xz
    license: MIT
    description: X11 protocol headers
    homepage: https://www.x.org/
    build_style: meson
    meson_flags:
      - "-Dlegacy=true"
    deps:
      build:
        - util-macros

  # --- Auth libraries ---
  - name: libXau
    version: "1.0.11"
    url: https://www.x.org/pub/individual/lib/libXau-${version}.tar.xz
    license: MIT
    description: X11 Authorization Protocol library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - xorgproto

  - name: libXdmcp
    version: "1.1.5"
    url: https://www.x.org/pub/individual/lib/libXdmcp-${version}.tar.xz
    license: MIT
    description: X Display Manager Control Protocol library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - xorgproto

  # --- XCB layer ---
  - name: xcb-proto
    version: "1.17.0"
    url: https://xorg.freedesktop.org/archive/individual/proto/xcb-proto-${version}.tar.xz
    license: MIT
    description: XCB protocol descriptions
    homepage: https://xcb.freedesktop.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"

  - name: libxcb
    version: "1.17.0"
    url: https://xorg.freedesktop.org/archive/individual/lib/libxcb-${version}.tar.xz
    license: MIT
    description: X C Binding library
    homepage: https://xcb.freedesktop.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
      - "--without-doxygen"
    deps:
      build:
        - xcb-proto
        - libXau
        - libXdmcp

  # --- Xorg Libraries (expanded from xorg7-lib) ---
  # Build order follows BLFS exactly — each may depend on previous ones

  - name: xtrans
    version: "1.5.2"
    url: https://www.x.org/pub/individual/lib/xtrans-${version}.tar.xz
    license: MIT
    description: X transport library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"

  - name: libX11
    version: "1.8.10"
    url: https://www.x.org/pub/individual/lib/libX11-${version}.tar.xz
    license: MIT
    description: Core X11 client library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libxcb
        - xtrans
        - xorgproto

  - name: libXext
    version: "1.3.6"
    url: https://www.x.org/pub/individual/lib/libXext-${version}.tar.xz
    license: MIT
    description: X11 miscellaneous extensions library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libX11

  - name: libFS
    version: "1.0.9"
    url: https://www.x.org/pub/individual/lib/libFS-${version}.tar.xz
    license: MIT
    description: X Font Service client library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - xtrans
        - xorgproto

  - name: libICE
    version: "1.1.2"
    url: https://www.x.org/pub/individual/lib/libICE-${version}.tar.xz
    license: MIT
    description: Inter-Client Exchange library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
      - "ICE_LIBS=-lpthread"
    deps:
      build:
        - xorgproto
        - xtrans

  - name: libSM
    version: "1.2.4"
    url: https://www.x.org/pub/individual/lib/libSM-${version}.tar.xz
    license: MIT
    description: X Session Management library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libICE

  - name: libXScrnSaver
    version: "1.2.4"
    url: https://www.x.org/pub/individual/lib/libXScrnSaver-${version}.tar.xz
    license: MIT
    description: X11 Screen Saver extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXext

  - name: libXt
    version: "1.3.1"
    url: https://www.x.org/pub/individual/lib/libXt-${version}.tar.xz
    license: MIT
    description: X Toolkit Intrinsics library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
      - "--with-appdefaultdir=/etc/X11/app-defaults"
    deps:
      build:
        - libX11
        - libSM
        - libICE

  - name: libXmu
    version: "1.2.1"
    url: https://www.x.org/pub/individual/lib/libXmu-${version}.tar.xz
    license: MIT
    description: X miscellaneous utility library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXt
        - libXext

  - name: libXpm
    version: "3.5.17"
    url: https://www.x.org/pub/individual/lib/libXpm-${version}.tar.xz
    license: MIT
    description: X Pixmap library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
      - "--disable-open-zfile"
    deps:
      build:
        - libXt
        - libXext

  - name: libXaw
    version: "1.0.16"
    url: https://www.x.org/pub/individual/lib/libXaw-${version}.tar.xz
    license: MIT
    description: X Athena Widgets library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXmu
        - libXpm

  - name: libXfixes
    version: "6.0.1"
    url: https://www.x.org/pub/individual/lib/libXfixes-${version}.tar.xz
    license: MIT
    description: X Fixes extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libX11

  - name: libXcomposite
    version: "0.4.6"
    url: https://www.x.org/pub/individual/lib/libXcomposite-${version}.tar.xz
    license: MIT
    description: X Composite extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
