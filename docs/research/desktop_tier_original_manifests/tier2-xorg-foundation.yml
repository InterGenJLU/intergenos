    license: MIT
    description: X Resize and Rotate extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXrender
        - libXext

  - name: libXtst
    version: "1.2.5"
    url: https://www.x.org/pub/individual/lib/libXtst-${version}.tar.xz
    license: MIT
