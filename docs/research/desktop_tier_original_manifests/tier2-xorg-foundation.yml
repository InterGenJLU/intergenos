      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libxcb

  - name: xcb-util-cursor
    version: "0.1.5"
    url: https://xcb.freedesktop.org/dist/xcb-util-cursor-${version}.tar.xz
    license: MIT
    description: XCB cursor library
    homepage: https://xcb.freedesktop.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - xcb-util-image
        - xcb-util-renderutil

  # --- Input stack ---
  - name: libinput
    version: "1.27.1"
    url: https://gitlab.freedesktop.org/libinput/libinput/-/archive/${version}/libinput-${version}.tar.gz
    license: MIT
    description: Input device management and event handling library
    homepage: https://www.freedesktop.org/wiki/Software/libinput/
    build_style: meson
    meson_flags:
      - "-Ddebug-gui=false"
      - "-Dtests=false"
      - "-Ddocumentation=false"
    deps:
      build:
        - libevdev
        - mtdev

