    homepage: https://www.x.org/
    build_style: meson
    deps:
      build:
        - util-macros

  - name: libxkbfile
    version: "1.1.3"
    url: https://www.x.org/pub/individual/lib/libxkbfile-${version}.tar.xz
    license: MIT
    description: XKB file handling library
    homepage: https://www.x.org/
    build_style: meson
    deps:
      build:
        - libX11

  - name: libxshmfence
    version: "1.3.2"
    url: https://www.x.org/pub/individual/lib/libxshmfence-${version}.tar.xz
