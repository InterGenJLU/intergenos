        - libXfixes

  - name: libXft
    version: "2.3.8"
    url: https://www.x.org/pub/individual/lib/libXft-${version}.tar.xz
    license: MIT
    description: X FreeType interface library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
