        - libxcb

  - name: xcb-util-wm
    version: "0.4.2"
    url: https://xcb.freedesktop.org/dist/xcb-util-wm-${version}.tar.xz
    license: MIT
    description: XCB window manager utilities
    homepage: https://xcb.freedesktop.org/
    build_style: autotools
