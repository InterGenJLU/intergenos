    url: https://www.x.org/pub/individual/lib/libXv-${version}.tar.xz
    license: MIT
    description: X Video extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXext

  - name: libXvMC
    version: "1.0.14"
    url: https://www.x.org/pub/individual/lib/libXvMC-${version}.tar.xz
    license: MIT
    description: X Video Motion Compensation library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
