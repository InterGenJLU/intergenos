  - name: libXxf86dga
    version: "1.1.6"
    url: https://www.x.org/pub/individual/lib/libXxf86dga-${version}.tar.xz
    license: MIT
    description: X XFree86-DGA extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXext

  - name: libXxf86vm
    version: "1.1.5"
    url: https://www.x.org/pub/individual/lib/libXxf86vm-${version}.tar.xz
    license: MIT
    description: X XFree86 Video Mode extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
