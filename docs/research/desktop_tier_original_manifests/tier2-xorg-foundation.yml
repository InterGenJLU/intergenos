        - libXfixes

  - name: libXrender
    version: "0.9.12"
    url: https://www.x.org/pub/individual/lib/libXrender-${version}.tar.xz
    license: MIT
    description: X Render extension library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libX11

  - name: libXcursor
    version: "1.2.3"
    url: https://www.x.org/pub/individual/lib/libXcursor-${version}.tar.xz
    license: MIT
    description: X Cursor management library
    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXfixes
