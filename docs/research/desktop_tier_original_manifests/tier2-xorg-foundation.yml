    homepage: https://www.x.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libXfixes
        - libXrandr

  # --- Wayland ---
  - name: wayland
    version: "1.23.1"
    url: https://gitlab.freedesktop.org/wayland/wayland/-/releases/${version}/downloads/wayland-${version}.tar.xz
    license: MIT
    description: Wayland display server protocol
    homepage: https://wayland.freedesktop.org/
    build_style: meson
    meson_flags:
      - "-Ddocumentation=false"
    deps:
      build:
        - libxml2

  - name: wayland-protocols
    version: "1.38"
    url: https://gitlab.freedesktop.org/wayland/wayland-protocols/-/releases/${version}/downloads/wayland-protocols-${version}.tar.xz
    license: MIT
    description: Wayland protocol extensions
    homepage: https://wayland.freedesktop.org/
    build_style: meson
    deps:
      build:
        - wayland

  # --- Keyboard config ---
  - name: xkeyboard-config
    version: "2.43"
    url: https://www.x.org/pub/individual/data/xkeyboard-config/xkeyboard-config-${version}.tar.xz
    license: MIT
    description: X Keyboard Configuration Database
    homepage: https://www.freedesktop.org/wiki/Software/XKeyboardConfig/
    build_style: meson
    deps:
      build:
        - libX11

  # --- XCB Utilities ---
  - name: xcb-util
    version: "0.4.1"
    url: https://xcb.freedesktop.org/dist/xcb-util-${version}.tar.xz
    license: MIT
    description: XCB utility library
    homepage: https://xcb.freedesktop.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
    deps:
      build:
        - libxcb

  - name: xcb-util-image
    version: "0.4.1"
    url: https://xcb.freedesktop.org/dist/xcb-util-image-${version}.tar.xz
    license: MIT
    description: XCB image convenience library
    homepage: https://xcb.freedesktop.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
