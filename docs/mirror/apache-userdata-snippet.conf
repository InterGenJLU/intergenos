# InterGenOS mirror vhost include — cPanel-userdata pattern.
#
# Drop into BOTH:
#   /etc/apache2/conf.d/userdata/std/2_4/intergen/intergenstudios.com/mirror_pkm.conf  (port 80)
#   /etc/apache2/conf.d/userdata/ssl/2_4/intergen/intergenstudios.com/mirror_pkm.conf  (port 443)
#
# (The std variant uses the redirect-to-HTTPS block below; the ssl variant
# uses the Location block below. Both files exist in the
# `mcp_proxy.conf` + `security_headers.conf` precedent.)
#
# After dropping in:
#   /usr/local/cpanel/scripts/rebuildhttpdconf
#   systemctl restart httpd
#
# This survives EasyApache rebuilds because it lives under
# /etc/apache2/conf.d/userdata/ which cPanel re-includes on every
# rebuildhttpdconf cycle.
#
# Design context: docs/mirror/design.md §5.

# ============================================================================
# ssl (port 443) variant — the actual serving block
# ============================================================================

<Location /mirror>
    # ---- Override site-wide CSP -------------------------------------------
    # The site's default CSP (from security_headers.conf) allows script-src
    # 'self' / style-src 'self' which is appropriate for the web frontend
    # but unnecessary for a downloadable-archives directory. Tighten to
    # default-src 'none' for /mirror/ — these are not web content.
    Header always set Content-Security-Policy "default-src 'none'; frame-ancestors 'none'"

    # ---- Cross-origin fetches OK ------------------------------------------
    # CORP/CORS: a freshly installed system fetching from `curl` or `pkm`
    # is not a same-origin client; allow cross-origin fetch.
    Header always set Cross-Origin-Resource-Policy: cross-origin
    Header always set Access-Control-Allow-Origin: "*"
    Header always set Access-Control-Allow-Methods: "GET, HEAD"

    # ---- No active web content under /mirror -----------------------------
    # These are downloadable archive files, never executable. Disable PHP
    # explicitly; remove handler maps cPanel-default scripts could match.
    php_admin_flag engine off

    # Strip handlers that might re-interpret content.
    RemoveHandler .php .php3 .php4 .php5 .phtml
    RemoveType application/x-httpd-php

    # Force octet-stream on archives so user-agents download rather than
    # try to render. `.igos.tar.gz` is not a standard MIME-typed extension.
    <FilesMatch "\.(igos\.tar\.gz|sig|db|asc)$">
        ForceType application/octet-stream
        Header set Content-Disposition "attachment"
    </FilesMatch>

    # ---- Symlink-following off --------------------------------------------
    # `current/` is a real directory (renames-as-atomic-promote), not a
    # symlink. Disable symlink following for defense-in-depth against
    # future drift or operator misconfiguration.
    Options -FollowSymLinks +Indexes

    # ---- Index style -----------------------------------------------------
    # mod_autoindex on so users can browse the tree, but minimal HTML.
    IndexOptions FancyIndexing HTMLTable SuppressDescription SuppressRules \
                 SuppressLastModified=0 FoldersFirst Charset=UTF-8

    # ---- Cache headers ---------------------------------------------------
    # Archives are content-addressed by name+version+release and the SHA256
    # is in the signed index; once published they NEVER change in place
    # (a new version is a new filename). Cache aggressively client-side.
    <FilesMatch "\.igos\.tar\.gz$">
        Header set Cache-Control "public, max-age=604800, immutable"
    </FilesMatch>

    # The index itself changes on every publish — no caching.
    <FilesMatch "InterGenOS\.db(\.sig)?$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </FilesMatch>

    # Per-archive signatures change as rarely as archives do.
    <FilesMatch "\.igos\.tar\.gz\.sig$">
        Header set Cache-Control "public, max-age=604800, immutable"
    </FilesMatch>
</Location>

# ============================================================================
# std (port 80) variant — redirect to HTTPS
# ============================================================================
#
# Replace the <Location /mirror> block above with this in the std variant
# of the file (do NOT keep both — the std variant should ONLY redirect):
#
# <Location /mirror>
#     # Force /mirror/* to HTTPS. The integrity boundary is GPG-signed
#     # archives, not TLS, so a plaintext fetch is not catastrophic — but
#     # there's no reason to permit it.
#     RewriteEngine on
#     RewriteCond %{HTTPS} off
#     RewriteRule ^/mirror/(.*)$ https://%{HTTP_HOST}/mirror/$1 [R=301,L]
# </Location>
