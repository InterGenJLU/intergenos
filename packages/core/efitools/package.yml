name: efitools
version: "1.9.2"
release: 1
description: Tools for manipulating UEFI Secure Boot variables and keys
license: GPL-2.0-only
homepage: https://git.kernel.org/pub/scm/linux/kernel/git/jejb/efitools.git
tier: core
build_style: make
install_func: do_install
source:
- url: https://git.kernel.org/pub/scm/linux/kernel/git/jejb/efitools.git/snapshot/efitools-${version}.tar.gz
  sha256: 0f315b36e7d1ba74bfc97ab9f304f0a3072c47578bbe5e42594acae381f9acfe
dependencies:
  build:
  - openssl
  - gnu-efi
  - help2man
  host: []
  runtime: []
patches:
  # Sourced from Debian efitools 1.9.2-5. Apply order matches Debian's
  # series file: FTBFS first (removes EFI-specific CFLAGS, fixes
  # __STDC_VERSION__ redefines, replaces unsafe mktemp/sscanf, adds
  # _XOPEN_SOURCE=700 for strptime), then stack-protector (re-adds
  # -fno-stack-protector for the EFI-binary subset, since freestanding
  # mode requires it), then gcc15 (C23 'bool' keyword conflict in
  # lib/asn1/typedefs.h).
  - file: efitools-1.9.2-fix-ftbfs-1.patch
    sha256: 1ee79172543b8e387e32568cd4320eb7d72a1f818b79b9c75c2f90f4769e6398
  - file: efitools-1.9.2-stack-protector-1.patch
    sha256: 2d073659da3be06b0a186c53395858cdbdc21e2d844d03369f9101485c87668c
  - file: efitools-1.9.2-gcc15-1.patch
    sha256: de2e78f43c157ec0133b2264f074499e05713dcf3012e9fc488475028eecd8ac
  # Debian Bug #1122408. binutils 2.40+ split objcopy's --target into
  # --input-target / --output-target; bare --target is now ambiguous and
  # produces "file format not recognized" on the .so→.efi conversion.
  # Same root cause as gnu-efi's apps/ failure earlier tonight.
  - file: efitools-1.9.2-objcopy-target-1.patch
    sha256: 3bfdb13801e3744c054fa04cda3d0035bab1f8668bec030fbe43916b6fccc3bf
  # InterGenOS-vendored: skip building EFISIGNED (*-signed.efi). These
  # are test fixtures signed with auto-generated ephemeral PK/KEK/DB
  # keys created by openssl-req at build time — random per build, no
  # user value. Their build invokes sbsign from sbsigntool, but
  # sbsigntool depends on efitools, creating a cyclic dep. Replacing
  # $(EFISIGNED) with $(EFIFILES) in all: builds the unsigned EFI
  # binaries (which the install rule actually ships) without needing
  # sbsign. Per Prime Directive: throwaway-keyed signed binaries are
  # complexity that doesn't serve the user.
  - file: efitools-1.9.2-skip-efisigned-1.patch
    sha256: 743729db035f081cb12bfb9c379eb4720db90a5ea6047a43661e7f9a1ac048ef
  # InterGenOS-vendored: xxdi.pl uses File::Slurp (CPAN, not in Perl
  # core) to slurp binary inputs (PK.crt etc.) for embedding into
  # generated headers (DB.h, PK.h, KEK.h). File::Slurp isn't in our
  # chroot. Replace with pure-Perl `open + binmode + local $/ + <FH>` —
  # verified byte-identical output to slurp() against an emulation of
  # File::Slurp's documented sysopen+sysread semantics (same SHA256).
  - file: efitools-1.9.2-xxdi-no-fileslurp-1.patch
    sha256: 10c391f8727f8a2b689c9722d605d9378bf847080396e94c7da163586778f3ab
  # InterGenOS-vendored: fix Make.rules:75 dep declaration. The
  # %-blacklist.esl rule's recipe invokes ./cert-to-efi-sig-list, but
  # the declared dep was cert-to-efi-hash-list (different binary).
  # Under parallel make, the rule fires before cert-to-efi-sig-list is
  # fully linked → exec() on a half-written ELF returns EACCES (make
  # reports as "Permission denied" / Error 127). Patch declares
  # cert-to-efi-sig-list as the dep, matching the recipe and mirroring
  # the %.esl rule's correct dep declaration two lines below. Surfaced
  # by Build #7 phase_core_extra 2026-05-10.
  - file: efitools-1.9.2-pk-blacklist-deps-1.patch
    sha256: cb3dcaf3f6027712a57a922285d3569cadf35b6ef33f44a42418650931ccbbab
