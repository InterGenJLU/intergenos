# Embedded grub.cfg for InterGenOS standalone GRUB EFI binary
#
# This config is baked into grubx64.efi at build time via
# `grub-mkstandalone --modules='...' "boot/grub/grub.cfg=embedded-grub.cfg"`.
#
# Purpose: bootstrap GRUB just far enough to find and load the real grub.cfg
# from the ESP. The real menu (3-entry: Try / Install-GUI / Install-TUI) lives
# at /EFI/InterGenOS/grub.cfg on the ESP and is shipped via the ISO assembly
# pipeline (installer/iso/grub/grub.cfg).
#
# Why two configs: the embedded one is signed-into-the-binary and immutable
# post-MS-sign. Loading the ESP-side cfg means we can iterate on menu content
# without re-signing GRUB. The shim_lock module enforces signature chain on
# whatever GRUB chains to next (the UKI), so the trust chain stays intact.

set timeout=0

# Find ESP partition by label (set by ISO assembly to "IGOS_ESP")
search --no-floppy --label IGOS_ESP --set=esp

if [ -e ($esp)/EFI/InterGenOS/grub.cfg ]; then
    configfile ($esp)/EFI/InterGenOS/grub.cfg
else
    # Fallback: try common ESP locations if label search fails
    set root=(cd0)
    if [ -e /EFI/InterGenOS/grub.cfg ]; then
        configfile /EFI/InterGenOS/grub.cfg
    else
        echo "InterGenOS GRUB: cannot find /EFI/InterGenOS/grub.cfg on ESP."
        echo "Boot media may be damaged. Press any key to drop to GRUB prompt."
        read
    fi
fi
