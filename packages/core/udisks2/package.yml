name: udisks2
version: "2.11.1"
release: 1
description: Disk management D-Bus service
license: GPL-2.0-or-later
homepage: https://github.com/storaged-project/udisks
tier: core
build_style: custom
install_func: do_install
source:
- url: https://github.com/storaged-project/udisks/releases/download/udisks-${version}/udisks-${version}.tar.bz2
  sha256: e88c52bae02fa13414604bbef42c6bb91c2e24177ee0057ed55c6bd7451bcb6d
dependencies:
  build:
  - libatasmart
  - libblockdev
  - libgudev
  - lvm2
  - polkit
  - glib2
  - systemd
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --sysconfdir=/etc
- --localstatedir=/var
- --disable-static
