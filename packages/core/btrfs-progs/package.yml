name: btrfs-progs
version: "6.19.1"
release: 1
description: Userspace utilities and headers for the Btrfs filesystem
license: GPL-2.0-only
homepage: https://btrfs.readthedocs.io/
# Tier moved core → extra in 2026-05-09 Build #6 podman halt fix:
# btrfs-progs was declared `tier: core` but NOT wired into either
# chroot-build-ch8.sh (LFS Ch.8 hardcoded list) nor chroot-build-core-
# extra.sh (run_package list) — same silent-skip shape as apparmor pre-
# f190f1c and pkm pre-a9d60a4. Result: btrfs-progs was never built,
# podman's vendor/go.podman.io/storage/drivers/btrfs/ failed to find
# /usr/include/btrfs/ioctl.h at compile time, halting the extra tier.
# Build #5 audit Halt #28 attempted a fix by adding the build dep
# declaration to podman's package.yml but never wired btrfs-progs
# itself into the build pipeline.
#
# Moving to tier:extra so the Python builder picks btrfs-progs up via
# topological sort during chroot-build-extra.sh's `--tier extra` run,
# placing it before podman in the build order. btrfs-progs's build
# deps (e2fsprogs, util-linux-core, lzo, zlib, zstd) are all present
# in the chroot by extra-phase entry (built in core / core-extra).
tier: core
build_style: custom
install_func: do_install
source:
- url: https://www.kernel.org/pub/linux/kernel/people/kdave/btrfs-progs/btrfs-progs-v${version}.tar.xz
  filename: btrfs-progs-v${version}.tar.xz
  sha256: bb27e1ec54e7c3c0b7b2e596f853a73c07a3d72f21bc94042073c24dbf045796
dependencies:
  build:
  - e2fsprogs       # libcom_err + libext2fs (uuid utilities)
  - util-linux-core # libblkid + libuuid
  - lzo
  - zlib
  - zstd
  host: []
  runtime: []

tests:
  enabled: false
  reason: "btrfs-progs's testsuite (test-fsck, test-cli, test-mkfs) creates loopback mounts at tests/mnt and runs live mkfs.btrfs/mount/umount operations. Beyond the chroot-environmental failures these tests produce (no kernel btrfs driver loaded, no reliable loop-device support — same shape as libfido2/tpm2-tss/libvisio), the bigger problem is that even with failure_policy=known_failures the orchestrator's post-test work-dir cleanup hits `OSError: [Errno 16] Device or resource busy: '.../tests/mnt'` because the tests left mounts active. tests:enabled:false avoids both the failures and the cleanup hazard. Library build (libbtrfs/, libbtrfsutil) and binaries (mkfs.btrfs, btrfs, btrfs-convert) compile and link cleanly without tests."
