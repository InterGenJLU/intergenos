name: lxml
version: "6.0.2"
release: 1
description: Python XML processing library
license: BSD-3-Clause
homepage: ''
tier: core
build_style: custom
install_func: do_install
source:
- url: https://files.pythonhosted.org/packages/source/l/lxml/lxml-${version}.tar.gz
  sha256: cd79f3367bd74b317dda655dc8fcfa304d9eb6e4fb06b7168c5cf27f96e0cd62
dependencies:
  build:
  - libxml2
  - libxslt
  - cython
  host: []
  runtime: []
# Fixed 2026-05-11: removed spurious build deps that were not real
# upstream requirements (at-spi2-core, lynx, pygobject3 — accessibility/
# browser/GObject-bindings, no relation to XML processing). Also
# removed docbook-xsl-nons (used for doc generation only; not a hard
# build dep). Added the missing libxml2 (lxml is Python bindings for
# libxml2 + libxslt) and cython (build-time C extension generator).
# Per-upstream lxml.de: real deps are libxml2 >= 2.9, libxslt >= 1.1.27,
# Cython. The spurious entries are residue of the BLFS dep importer's
# contaminated-rows bug class (same shape as the hatch-pair self-cycle
# fixed in 7554f7b).
verify_paths:
  - /usr/bin/mako-render
  - /usr/lib/python3.14/site-packages/lxml
