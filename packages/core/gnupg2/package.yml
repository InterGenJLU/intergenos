name: gnupg2
version: "2.5.17"
release: 1
description: GNU Privacy Guard
license: GPL-3.0-or-later
homepage: https://www.gnupg.org/
tier: core
build_style: autotools
install_func: do_install
source:
- url: https://www.gnupg.org/ftp/gcrypt/gnupg/gnupg-${version}.tar.bz2
  sha256: 2c1fbe20e2958fd8fb53cf37d7c38e84a900edc0d561a1c4af4bc3a10888685d
dependencies:
  build:
  - libassuan
  - libgcrypt
  - libksba
  - npth
  - gnutls
  - pinentry-pass1  # cycle-break: gnupg2 → pinentry-pass1 → (no gcr); full pinentry depends on gcr → gnupg2, so we use the pass1 here. pinentry (full) supersedes pinentry-pass1 at install time, so the runtime sees a single pinentry with the GNOME3 frontend.
  - curl
  - fuse3
  - libusb
  - openldap
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --localstatedir=/var
- --sysconfdir=/etc
