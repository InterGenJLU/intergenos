name: apparmor
version: "3.1.7"
release: 1
description: AppArmor profile set for InterGenOS (base + custom profiles)
license: GPL-2.0-only
homepage: https://gitlab.com/apparmor/apparmor
# Tier moved from core → desktop in Build #6 Halt #7b fix: apparmor was
# declared as build dep of systemd-pass2 (Build #5 audit fix 04e36a7) but
# never wired into chroot-build-ch8.sh or chroot-build-core-extra.sh, so
# tier:core meant "supposed to be already-built in core phase, but isn't."
# Moving to tier:desktop lets the Python builder pick it up via topological
# sort and build it before systemd-pass2. apparmor's deps (host: perl-core,
# python, bash) are all available in the chroot by desktop-phase entry.
tier: desktop
build_style: custom
source:
- url: https://gitlab.com/apparmor/apparmor/-/archive/v${version}/apparmor-v${version}.tar.gz
  sha256: 64494bd99fa6547a9cbdb4fc6bc732451a02dd19e6eb70eab977b239632151eb
- url: https://deb.debian.org/debian/pool/main/a/apparmor-profiles-extra/apparmor-profiles-extra_1.35.tar.xz
  sha256: 31d0a65d2c1c0c8dc91d87437020bf4341b6bb1c8d324944628d6fc629039165
dependencies:
  build: []
  host: [perl-core, python, bash]
  runtime: []
