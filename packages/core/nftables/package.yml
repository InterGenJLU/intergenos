name: nftables
version: 1.1.3
release: 3
description: Netfilter nftables packet filtering framework
license: GPL-2.0-or-later
homepage: https://www.netfilter.org/projects/nftables/
tier: core
build_style: autotools
install_func: do_install
source:
- url: https://www.netfilter.org/projects/nftables/files/nftables-${version}.tar.xz
  sha256: 9c8a64b59c90b0825e540a9b8fcb9d2d942c636f81ba50199f068fde44f34ed8
dependencies:
  build:
  - libnftnl
  - libmnl
  - gmp
  - readline
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --sysconfdir=/etc
- --with-json
- --disable-man-doc
- --with-cli=readline
