#!/usr/sbin/nft -f
# InterGenOS default nftables ruleset.
#
# Permissive default — establishes the filter table structure but
# accepts traffic by default. Operators tighten by editing this file
# and reloading: `systemctl reload nftables`.
#
# To enforce a default-drop posture, change `policy accept` to
# `policy drop` on the input chain and add `accept` rules for any
# services you expose (SSH on tcp/22, etc.). Reference:
# https://wiki.nftables.org/wiki-nftables/index.php/Quick_reference-nftables_in_10_minutes

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy accept;
        # Always allow established + related connections to flow through.
        ct state established,related accept
        # Block known-bad traffic.
        ct state invalid drop
        # Always trust loopback.
        iif lo accept
    }

    chain forward {
        type filter hook forward priority filter; policy accept;
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
