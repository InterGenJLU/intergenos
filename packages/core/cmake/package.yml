name: cmake
version: "4.3.1"
release: 1
description: Cross-platform build system generator
license: BSD-3-Clause
homepage: https://cmake.org/
tier: core
build_style: custom
install_func: do_install

source:
  - url: https://cmake.org/files/v4.3/cmake-${version}.tar.gz
    sha256: 0798f4be7a1a406a419ac32db90c2956936fecbf50db3057d7af47d69a2d7edb

dependencies:
  build:
    - curl
    - libarchive
    - libuv
    - nghttp2
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "ctest suite contains tests requiring network access (download/fetch modules), tty/interactive tests, and locale-dependent file-handling tests that fail in offline chroot."
verify_paths:
  - /usr/bin/cmake
  - /usr/bin/ccmake
  - /usr/share/cmake-4.3
