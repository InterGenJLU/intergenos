#!/usr/sbin/nft -f
# InterGenOS default-deny firewall — per D-011 owner directive
# (docs/owner-directives.md, 2026-05-19T21:47:58Z).
#
# Posture: default-DROP on INPUT and FORWARD. Outbound allowed.
# Inbound limited to: established/related + loopback + ICMP echo-request
# + ICMP fragmentation-needed (path-MTU discovery) + IPv6 neighbor
# discovery (required for IPv6 to function).
#
# SSH inbound (tcp/22) is CLOSED by default. Users who want SSH server
# open it themselves via direct nft edit, a future GUI control panel,
# or by adding a drop-in rule. WE DO NOT LISTEN BY DEFAULT.
#
# To remove the InterGenOS default policy and configure your own
# firewall: `pkm remove intergenos-firewall-defaults`. The upstream
# nftables tool stays installed; you write /etc/nftables.conf yourself.
#
# Distro precedent for this posture: Fedora Workstation (firewalld
# FedoraWorkstation zone), Ubuntu Desktop (ufw default-deny when
# enabled), openSUSE Leap Desktop (SuSEfirewall2 closed-by-default),
# macOS (SSH off by default), Windows (SSH service not running by
# default).

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Always allow loopback. Without this, intra-host services
        # (DBus, X11, local sockets bound to 127.0.0.1) break.
        iif "lo" accept

        # Drop invalid connections early. Conntrack flags packets
        # that fail state-machine validation; dropping them keeps
        # broken stacks from causing local processing overhead.
        ct state invalid drop

        # Established + related — allows the responses to outbound
        # connections to come back in. Without this, every outbound
        # connection is one-way (TCP handshake hangs at SYN-ACK).
        ct state established,related accept

        # ICMP echo-request (ping) — keeps `ping <this-host>` working
        # from peers on the LAN. Standard expected behavior; even
        # default-deny firewalls usually allow ping.
        ip protocol icmp icmp type echo-request accept
        ip6 nexthdr ipv6-icmp icmpv6 type echo-request accept

        # ICMP fragmentation-needed (IPv4) + packet-too-big (IPv6).
        # Required for path-MTU discovery; without these, TCP across
        # any MTU boundary (VPN, GRE tunnel, etc.) silently stalls.
        # The IPv4 rule narrows on code "fragmentation-needed" per
        # D-011 verbatim — wider destination-unreachable accept would
        # admit host-unreachable + port-unreachable + protocol-
        # unreachable etc., none of which D-011 authorizes.
        ip protocol icmp icmp type destination-unreachable icmp code fragmentation-needed accept
        ip6 nexthdr ipv6-icmp icmpv6 type packet-too-big accept

        # IPv6 Neighbor Discovery — required for IPv6 to function.
        # Without ND, IPv6 addresses won't resolve to MAC + router
        # advertisements get dropped + the host becomes invisible
        # on IPv6 networks.
        ip6 nexthdr ipv6-icmp icmpv6 type {
            nd-router-advert,
            nd-neighbor-solicit,
            nd-neighbor-advert
        } accept

        # Everything else inbound DROPS via the chain policy above.
        # No SSH (tcp/22). No mDNS (udp/5353). No anything else.
        # Add explicit accept rules ABOVE this comment for any
        # services you want to expose.
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        # No default forward rules. Users adding container/VM
        # bridging append accept rules above this comment.
    }

    chain output {
        type filter hook output priority filter; policy accept;
        # Outbound allowed. The default-deny posture is on the
        # INBOUND surface; outbound is trusted.
    }
}
