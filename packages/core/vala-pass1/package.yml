name: vala-pass1
version: "0.56.18"
release: 1
description: Vala programming language compiler (bootstrap — without valadoc/graphviz)
license: LGPL-2.1-or-later
homepage: https://wiki.gnome.org/Projects/Vala
tier: core
build_style: custom
install_func: do_install
source:
- url: https://download.gnome.org/sources/vala/0.56/vala-${version}.tar.xz
  sha256: f2affe7d40ab63db8e7b9ecc3f6bdc9c2fc7e3134c84ff2d795f482fe926a382
dependencies:
  build:
  - glib2-bootstrap
  host: []
  runtime: []
# First pass of the 2-pass vala build. Built with --disable-valadoc so it
# does NOT depend on graphviz (tier:desktop). Provides valac + vapigen for
# libgudev (tier:desktop, force-wired in core-extra) so libgudev can
# generate its .vapi bindings at build time. Full vala with valadoc and
# graphviz support lives in tier:desktop and supersedes pass1 at install
# time via migrate-pkm-supersedes.sh.
