name: wayland-protocols
version: '1.47'
release: 1
description: Wayland protocol extensions
license: MIT
homepage: https://wayland.freedesktop.org/
tier: core
build_style: custom
install_func: do_install
source:
- url: https://gitlab.freedesktop.org/wayland/wayland-protocols/-/releases/${version}/downloads/wayland-protocols-${version}.tar.xz
  sha256: 5fd4349bcbc9bab9a46f8cf77d1f434296a7a052c87440a094f63fcf62a58e20
dependencies:
  build: []
  host: []
  runtime: []
# wayland was declared as a build dep but wayland-protocols is just XML
# protocol definitions — the build only installs .xml files under
# /usr/share/wayland-protocols/, with no compilation step that requires
# libwayland or wayland-scanner. The spurious entry was likely contributed
# by BLFS dep importer mis-attribution (same class of bug that produced
# the hatch-pair self-cycle, fixed in 7554f7b). Audited 2026-05-11.
