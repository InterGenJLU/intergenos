name: imagemagick
version: "7.1.2-13"
release: 1
description: Image processing and conversion suite
license: ImageMagick
homepage: https://imagemagick.org/
tier: core
build_style: custom
install_func: do_install
source:
- url: https://www.imagemagick.org/archive/releases/ImageMagick-${version}.tar.xz
  sha256: 968e022c8c7ee620680bac658628ef0f582be7b8aa71b386a9a9d068ec17dbd2
dependencies:
  build:
  - freetype2
  - libjpeg-turbo
  - libpng
  - libtiff
  - libwebp
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "chroot environment limits — ImageMagick test suite expects fonts, display, and external test data not available in the build chroot."
