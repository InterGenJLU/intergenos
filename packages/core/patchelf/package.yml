name: patchelf
version: "0.18.0"
release: 1
description: Tool for rewriting RPATH and dynamic-section entries of ELF binaries
license: GPL-3.0-or-later
homepage: https://github.com/NixOS/patchelf
tier: core
build_style: autotools
install_func: do_install
source:
- url: https://github.com/NixOS/patchelf/releases/download/${version}/patchelf-${version}.tar.gz
  sha256: 64de10e4c6b8b8379db7e87f58030f336ea747c0515f381132e810dbf84a86e7
dependencies:
  build: []
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --docdir=/usr/share/doc/patchelf-${version}
# Added 2026-05-11 (audit-surfaced gap): dbus-python and other Python
# bindings use patchelf post-build to fix RPATH on installed .so files
# so they load correctly under the system loader. patchelf has zero
# system deps beyond the LFS Ch 8 toolchain (g++, make, autoconf,
# automake, gcc); fast build, ships a single binary.
verify_paths:
  - /usr/bin/patchelf
