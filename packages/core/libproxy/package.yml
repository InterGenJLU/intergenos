name: libproxy
version: "0.5.12"
release: 1
description: Automatic proxy configuration management library
license: LGPL-2.1-or-later
homepage: https://github.com/libproxy/libproxy
tier: core
build_style: custom
install_func: do_install
source:
- url: https://github.com/libproxy/libproxy/archive/${version}/libproxy-${version}.tar.gz
  sha256: a1fa55991998b80a567450a9e84382421a7176a84446c95caaa8b72cf09fa86f
dependencies:
  build:
  - curl
  - duktape
  - glib2
  - gsettings-desktop-schemas
  - vala
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "PAC/WPAD discovery tests fetch from network and probe DBus/GSettings on a live session bus; offline chroot has neither"
