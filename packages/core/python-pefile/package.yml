name: python-pefile
version: "2024.8.26"
release: 1
description: Python module to read and work with Portable Executable (PE) files
license: MIT
homepage: https://github.com/erocarrera/pefile
source:
- url: https://pypi.org/packages/source/p/pefile/pefile-${version}.tar.gz
  sha256: 3ff6c5d8b43e8c37bb6e6dd5085658d658a7a0bdcd20b6a07b1fcfc1c4e9d632
dependencies:
  build: []
  host:
  - setuptools
  - wheel
  runtime: []
tier: core
build_style: custom
# Pure-Python module. Required at systemd-pass2 build time for the ukify
# tool (Unified Kernel Image generator). Without pefile, ukify is disabled
# and the bootloader's signed-UKI workflow loses its upstream tooling.

verify_paths:
  - /usr/lib/python3.13/site-packages
