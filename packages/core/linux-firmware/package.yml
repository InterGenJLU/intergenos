name: linux-firmware
version: "20260309"
release: 1
description: Firmware files for Linux kernel drivers (WiFi, GPU, audio, etc.)
license: Various (redistributable)
homepage: https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git
tier: core
build_style: custom
install_func: do_install
source:
- url: https://www.kernel.org/pub/linux/kernel/firmware/linux-firmware-${version}.tar.xz
  sha256: c74cc6f562b58ad5bc6b2b00a61abc29c9e49e06126e7ba34fbca9928e07a96c
dependencies:
  build: []
  host: []
  runtime: []
# parallel and rdfind were declared as build-time helpers (parallel copy +
# duplicate-firmware deduplication). They are install-time optimizations
# only — the installed firmware is byte-identical with or without them,
# so dropping the optional deps does NOT remove any user-facing capability.
# Owner-approved 2026-05-11 under the criterion "build-time-only with no
# installed-artifact impact = OK to drop." If parallel/rdfind are present
# in the chroot at install time, the build.sh may use them; if absent,
# the build falls back to plain cp/no-dedup.
#
# verify_paths: canary files from the major firmware trees that linux-
# firmware ships. The pre-squashfs audit checks each path exists on the
# chroot's disk. linux-firmware isn't in LFS/BLFS books so these are
# hand-curated. The first entry (carrizo_sdma.bin) is the specific file
# whose absence broke DS-v2 amdgpu boot in v3+ — keep it as the canary
# regression check.
verify_paths:
  - /usr/lib/firmware/amdgpu/carrizo_sdma.bin
  - /usr/lib/firmware/amdgpu
  - /usr/lib/firmware/iwlwifi
