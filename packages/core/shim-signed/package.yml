name: shim-signed
version: "16.1"
release: 1
description: Microsoft-signed UEFI shim bootloader (piggyback from Fedora until our own MS-signed shim ships)
license: BSD-2-Clause-Patent
homepage: https://github.com/rhboot/shim
tier: core
build_style: custom
install_func: do_install
# PER signing_key_custody_2026-04-18.md D1-7:
# We piggyback on Fedora's MS-signed shim for Monday minimum-viable SB.
# The Fedora shim accepts our MOK at first-boot enrollment via MokManager.
# Post-Monday parallel track: get our own MS-signed shim through the
# Microsoft UEFI CA sponsorship process (6-12 weeks; sponsor required).
#
# VENDORED per WC's HG #4+#9 review (channel 21:20):
# Primary URL is our source mirror (controlled, verified, sha256-locked).
# Fallback URL is upstream Fedora kojipkgs (used only if mirror is down,
# emits a build warning if used). Vendoring breaks the dependency on
# Fedora infrastructure being reachable at build time.
#
# Source: Fedora's shim-x64 RPM, repackaged. We extract shimx64.efi,
# mmx64.efi (MokManager), and bootx64.efi from the RPM payload and
# install them under /usr/share/shim-signed/ for Forge to copy to ESP.
source:
- url: https://intergenstudios.com/intergenos/sources/current/shim-x64-${version}-1.fc41.x86_64.rpm
  fallback_url: https://kojipkgs.fedoraproject.org/packages/shim/${version}/1.fc41/x86_64/shim-x64-${version}-1.fc41.x86_64.rpm
  sha256: VERIFY_ON_FIRST_BUILD
dependencies:
  build:
  - cpio
  - rpm2cpio
  host: []
  runtime: []
