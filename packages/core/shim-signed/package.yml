name: shim-signed
version: "16.1"
release: 1
description: Microsoft-signed UEFI shim bootloader (Fedora-piggyback per D-002, dual-tracked with own shim-review PR per D-003)
license: BSD-2-Clause-Patent
homepage: https://github.com/rhboot/shim
tier: core
build_style: custom
install_func: do_install
# D-002 (2026-05-18, owner-ratified) authorizes Fedora-piggyback shipping
# day-0. D-003 ratifies the own-MS-signed shim arm via rhboot/shim-review
# PR (target 2026-05-22). Legal cover for redistribution recorded at
# docs/governance/fedora-shim-redistribution.md (P-009 closure).
#
# Vendor-pinned shim from Fedora, signed by Microsoft. We piggyback on
# Fedora's MS-signed shim as the v1.0 shipping path; users' machines
# accept the shim via Fedora's vendor_db and enroll their per-install
# user-MOK (per D-005) via MokManager at first boot.
#
# Source vendoring rationale: the primary URL is our own source mirror
# (controlled, verified, sha256-locked). The fallback URL is upstream
# Fedora kojipkgs and is used only when the mirror is unreachable; using
# the fallback emits a build warning. Vendoring removes the build-time
# dependency on Fedora infrastructure being reachable.
#
# Source: Fedora's shim-x64 RPM, repackaged. We extract shimx64.efi,
# mmx64.efi (MokManager), and bootx64.efi from the RPM payload and
# install them under /usr/share/shim-signed/ for Forge to copy to ESP.
source:
- url: https://intergenstudios.com/intergenos/sources/current/shim-x64-${version}-2.x86_64.rpm
  fallback_url: https://kojipkgs.fedoraproject.org/packages/shim/${version}/2/x86_64/shim-x64-${version}-2.x86_64.rpm
  sha256: 1662629916cf2322ff8e6333439643bca63e6e6327d2e6089bf66cb7a8c5dc4b
dependencies:
  build:
  - cpio
  - rpm
  host: []
  runtime: []
