name: libass
version: "0.17.4"
release: 1
description: Portable subtitle renderer (ASS/SSA format)
license: ISC
homepage: https://github.com/libass/libass
tier: core
build_style: autotools
install_func: do_install
source:
- url: https://github.com/libass/libass/releases/download/${version}/libass-${version}.tar.xz
  sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a
dependencies:
  build:
  - freetype2
  - fribidi
  - fontconfig
  - nasm
  - harfbuzz
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
