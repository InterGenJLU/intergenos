name: gptfdisk
version: "1.0.10"
release: 1
description: GPT fdisk partition tools (sgdisk, cgdisk, gdisk, fixparts)
license: GPL-2.0-only
homepage: https://www.rodsbooks.com/gdisk/
tier: core
build_style: custom
install_func: do_install
# T0-3 sub-cluster 1 — installer runtime dep. Provides sgdisk for scripted GPT
# partition manipulation (cleaner than parted for non-interactive use).
# BLFS 13.0 reference: postlfs/gptfdisk. Upstream Makefile has no install
# target; build.sh inlines the BLFS-convenience-patch logic via sed (avoiding
# a separate patches/ tree).
source:
- url: https://downloads.sourceforge.net/project/gptfdisk/${version}/gptfdisk-${version}.tar.gz
  sha256: 2abed61bc6d2b9ec498973c0440b8b804b7a72d7144069b5a9209b2ad693a282
dependencies:
  build:
    - popt          # required for sgdisk CLI parsing
    - ncurses-core  # required for cgdisk
  host: []
  runtime: []
verify_paths:
  - /usr/sbin/sgdisk
  - /usr/sbin/cgdisk
  - /usr/sbin/gdisk
  - /usr/sbin/fixparts
