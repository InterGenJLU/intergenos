name: mokutil
version: "0.7.2"
release: 1
description: Tool for managing Machine Owner Keys (MOK) for Secure Boot
license: GPL-3.0-or-later
homepage: https://github.com/lcp/mokutil
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://github.com/lcp/mokutil/archive/refs/tags/${version}.tar.gz
  filename: mokutil-${version}.tar.gz
  sha256: 839d677c4fc9805f1565703ca32863e4652692c53da66a88ae9b9e30676f9e17
dependencies:
  build:
  - efivar
  - openssl
  - keyutils
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --sysconfdir=/etc
