name: rasqal
version: "0.9.33"
release: 1
description: RDF query language library (SPARQL)
license: LGPL-2.1-or-later
homepage: https://librdf.org/rasqal/
tier: core
build_style: autotools
install_func: do_install
source:
- url: https://download.librdf.org/source/rasqal-${version}.tar.gz
  sha256: 6924c9ac6570bd241a9669f83b467c728a322470bf34f4b2da4f69492ccfd97c
dependencies:
  build:
  - raptor2
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "no network in chroot — some SPARQL test cases reference remote endpoints; also inherits raptor2 XML test variances."
