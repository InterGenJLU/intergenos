name: gawk-tmp
version: "5.3.2"
release: 1
description: "GNU awk (temporary tools)"
license: GPL-3.0-or-later
homepage: https://www.gnu.org/software/gawk/

source:
  - url: https://ftpmirror.gnu.org/gawk/gawk-${version}.tar.xz
    sha256: f8c3486509de705192138b00ef2c00bbbdd0e84c30d5c07d23fc73a9dc4cc9cc

dependencies:
  build: []
  host:
    - ncurses
  runtime: []

tier: toolchain
target_triple: x86_64-igos-linux-gnu
build_style: autotools
configure_flags:
  - --prefix=/usr
  - --host=$IGOS_TARGET
  - --build=$(build-aux/config.guess)
