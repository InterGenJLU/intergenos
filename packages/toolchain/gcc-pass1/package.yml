name: gcc-pass1
version: "15.2.0"
release: 1
description: "GCC cross-compiler (pass 1 — C only)"
license: GPL-3.0-or-later
homepage: https://gcc.gnu.org/

source:
  - url: https://ftp.gnu.org/gnu/gcc/gcc-${version}/gcc-${version}.tar.xz
    sha256: 438fd996826b0c82485a29da03a72d71d6e3541a83ec702df4271f6fe025d24e
  - url: https://ftp.gnu.org/gnu/mpfr/mpfr-4.2.2.tar.xz
    sha256: b67ba0383ef7e8a8563734e2e889ef5ec3c3b898a01d00fa0a6869ad81c6ce01
  - url: https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
    sha256: a3c2b80201b89e68616f4ad30bc66aee4927c3ce50e33929ca819d5c43538898
  - url: https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz
    sha256: ab642492f5cf882b74aa0cb730cd410a81edcdbec895183ce930e706c1c759b8


dependencies:
  build: []
  host:
    - binutils-pass1
  runtime: []

tier: toolchain
pass_number: 1
target_triple: x86_64-igos-linux-gnu
build_style: custom
install_func: install

bundled_deps:
  - mpfr-4.2.2 -> gcc-${version}/mpfr
  - gmp-6.3.0 -> gcc-${version}/gmp
  - mpc-1.3.1 -> gcc-${version}/mpc

configure_flags:
  - --target=x86_64-igos-linux-gnu
  - --prefix=$IGOS/tools
  - --with-glibc-version=2.43
  - --with-sysroot=$IGOS
  - --with-newlib
  - --without-headers
  - --enable-default-pie
  - --enable-default-ssp
  - --disable-nls
  - --disable-shared
  - --disable-multilib
  - --disable-threads
  - --disable-libatomic
  - --disable-libgomp
  - --disable-libquadmath
  - --disable-libssp
  - --disable-libvtv
  - --disable-libstdcxx
  - --enable-languages=c,c++

validation:
  - type: sanity_check
    description: "Verify cross-compiler was built"
    script: "ls $IGOS/tools/bin/x86_64-igos-linux-gnu-gcc"
    fatal: true
