name: bison-tmp
version: "3.8.2"
release: 1
description: "GNU parser generator (temporary tools)"
license: GPL-3.0-or-later
homepage: https://www.gnu.org/software/bison/

source:
  - url: https://ftpmirror.gnu.org/bison/bison-${version}.tar.xz
    sha256: 9bba0214ccf7f1079c5d59210045227bcf619519840ebfa80cd3849cff5a5bf2

dependencies:
  build: []
  host:
    - gettext-tmp
  runtime: []

tier: toolchain
target_triple: x86_64-igos-linux-gnu
build_style: autotools
configure_flags:
  - --prefix=/usr
  - --docdir=/usr/share/doc/bison-${version}
