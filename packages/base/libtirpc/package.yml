name: libtirpc
version: "1.3.7"
release: 1
description: Transport-Independent RPC library
license: BSD-3-Clause
homepage: https://sourceforge.net/projects/libtirpc/
tier: base
build_style: autotools

source:
  - url: https://downloads.sourceforge.net/libtirpc/libtirpc-${version}.tar.bz2
    sha256: b47d3ac19d3549e54a05d0019a6c400674da716123858cfdb6d3bdd70a66c702

dependencies:
  build:
  - mitkrb
  host: []
  runtime: []

configure_flags:
  - "--prefix=/usr"
  - "--sysconfdir=/etc"
  - "--disable-static"
  - "--disable-gssapi"
