name: libidn2
version: 2.3.8
release: 1
description: Internationalized domain names library
license: LGPL-3.0-or-later
homepage: https://www.gnu.org/software/libidn/
tier: base
build_style: autotools

source:
  - url: https://ftpmirror.gnu.org/libidn/libidn2-${version}.tar.gz
    sha256: placeholder-libidn2-2.3.8

dependencies:
  build:
    - libunistring
  host: []
  runtime: []

configure_flags:
  - "--prefix=/usr"
  - "--disable-static"
