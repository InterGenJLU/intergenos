# InterGenOS default-secure config for Apache httpd 2.4.x
#
# Loaded after /etc/httpd/httpd.conf as a drop-in from conf.d/.
# This sample is TLS-only and loopback-bound by default. Operators
# wanting network exposure or HTTP-without-TLS deliberately edit or
# remove this file's Listen directives.

# Hide version info from response headers + signatures
ServerTokens Prod
ServerSignature Off
TraceEnable Off

# Disable obsolete protocols at the server level
Protocols h2 http/1.1

# Bind TLS-only on loopback. Operators flip 127.0.0.1 to a real
# interface deliberately. The :80 HTTP listener is intentionally NOT
# enabled here — operators add it explicitly if they want HTTP→HTTPS
# redirect or unencrypted serving (the latter is discouraged).
Listen 127.0.0.1:443 https

# TLS configuration. Self-signed cert generated at post_install time
# to /etc/httpd/ssl/server.pem + .key. Operators replace with a
# CA-signed pair for production.
<VirtualHost 127.0.0.1:443>
    ServerName localhost
    DocumentRoot "/var/www/html"

    SSLEngine on
    SSLCertificateFile /etc/httpd/ssl/server.pem
    SSLCertificateKeyFile /etc/httpd/ssl/server.key
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5:!RC4:!3DES:!DH
    SSLHonorCipherOrder on
    SSLSessionTickets off
    SSLCompression off
    SSLUseStapling on
    SSLStaplingCache "shmcb:logs/ssl_stapling(32768)"

    <Directory "/var/www/html">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Security headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer-when-downgrade"

    # No directory listings, no version banner anywhere
    Options -Indexes
    ErrorLog /var/log/httpd/error.log
    CustomLog /var/log/httpd/access.log combined
</VirtualHost>

# /server-status endpoint — locked to loopback if mod_status is loaded.
# Defense-in-depth: even with the listen-loopback default above, this
# explicit allow-127.0.0.1 + deny-all means a future operator who
# flips the listen address to a public interface won't accidentally
# expose status data.
<IfModule mod_status.c>
    <Location "/server-status">
        SetHandler server-status
        Require ip 127.0.0.1
    </Location>
    ExtendedStatus On
</IfModule>
