name: opusfile
version: "0.12"
release: 1
description: High-level decoder library for the standard Opus-in-Ogg container format
license: BSD-3-Clause
homepage: https://opus-codec.org/
tier: extra
build_style: custom
install_func: do_install
source:
- url: https://downloads.xiph.org/releases/opus/opusfile-${version}.tar.gz
  sha256: 118d8601c12dd6a44f52423e68ca9083cc9f2bfe72da7a8c1acb22a80ae3550b
dependencies:
  build:
  - libogg
  - opus
  - openssl
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
verify_paths:
  - /usr/lib/libopusfile.so
  - /usr/lib/pkgconfig/opusfile.pc
