name: rocksdb
version: "11.1.1"
release: 1
description: Facebook/Meta RocksDB — embedded high-performance persistent KV store (LSM-tree)
license: "(Apache-2.0 OR GPL-2.0) AND BSD-3-Clause"
homepage: https://github.com/facebook/rocksdb
tier: extra
build_style: cmake
install_func: do_install
source:
- url: https://github.com/facebook/rocksdb/archive/refs/tags/v${version}.tar.gz
  sha256: 63f11183fe40725a0e89a9e392f2c86c94b90064f1d95f5173a02cfe40de13f7
dependencies:
  build:
  - cmake
  - ninja
  - snappy
  - gflags
  - jemalloc
  - liburing
  - zlib
  - lz4
  - zstd
  - bzip2
  host: []
  runtime:
  - snappy
  - gflags
  - jemalloc
  - liburing
  - zlib
  - lz4
  - zstd
  - bzip2
verify_paths:
  - /usr/lib/librocksdb.so
  - /usr/include/rocksdb
