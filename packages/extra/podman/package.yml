name: podman
version: "5.8.2"
release: 1
description: Tool and library for managing OCI containers and pods
license: Apache-2.0
homepage: https://podman.io/
tier: extra
build_style: custom
install_func: do_install
source:
  - url: https://github.com/containers/podman/archive/refs/tags/v${version}.tar.gz
    sha256: b20ea65afc5a58ea1cea019bd51a5d84eb9042d25d3eb82c55010c8815732d84
dependencies:
  build:
    - go
    - go-md2man
    - pkgconf
    - btrfs-progs   # provides /usr/include/btrfs/ioctl.h required by
                    # vendor/go.podman.io/storage/drivers/btrfs/btrfs.go.
                    # Build #5 audit Halt #28.
  host:
    - glib2
    - systemd
  runtime:
    - aardvark-dns
    - catatonit
    - conmon
    - containers-common
    - crun
    - fuse-overlayfs
    - netavark
    - passt
    - yajl

tests:
  enabled: false
  reason: "podman's `make localunit` requires ginkgo (Go's BDD test framework) at ./bin/ginkgo which the project's Makefile expects to be installed in-tree. The chroot doesn't have ginkgo installed and the offline build can't `go install` it. Beyond that, podman's unit tests exercise live container operations (network namespaces, cgroup creation, OCI runtime invocation) that depend on a working kernel + runtime context the chroot doesn't have. The build itself (`make BUILDTAGS=...`) succeeds and produces working podman + podmansh binaries. Same chroot-environmental shape as btrfs-progs (loop devices), libfido2 (no FIDO2 hw), tpm2-tss (no TPM2 simulator)."
verify_paths:
  - /usr/bin/podman
  - /usr/bin/podman-remote
  - /usr/bin/podmansh
