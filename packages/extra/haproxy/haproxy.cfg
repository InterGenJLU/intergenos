# /etc/haproxy/haproxy.cfg — InterGenOS default-secure config for HAProxy
#
# Design goals:
#   - Loopback-only bind by default (operator opts in to network
#     interfaces deliberately by editing the `bind` directives below)
#   - Stats endpoint locked to 127.0.0.1 with Basic Auth (defense-in-
#     depth alongside the loopback bind)
#   - Admin socket on /run/haproxy/admin.sock as unix-domain only
#     (no TCP admin exposure)
#   - TLS-only :443 with the self-signed cert auto-generated at
#     package install time; replace with a real CA-signed cert for
#     production
#   - Modern TLS ciphers + HTTP/2 + HTTP/3 (QUIC)
#   - Minimal logging to /var/log/haproxy/haproxy.log via syslog facility

global
    log         127.0.0.1 local2
    chroot      /var/lib/haproxy
    pidfile     /run/haproxy/haproxy.pid
    maxconn     4096
    user        haproxy
    group       haproxy
    daemon

    stats socket /run/haproxy/admin.sock mode 660 level admin

    # Modern TLS defaults (Mozilla intermediate profile)
    ssl-default-bind-ciphers       ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20
    ssl-default-bind-ciphersuites  TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options       prefer-client-ciphers no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets

    ssl-default-server-ciphers     ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20
    ssl-default-server-options     no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets

    tune.ssl.default-dh-param      2048

defaults
    mode                http
    log                 global
    option              httplog
    option              dontlognull
    option              forwardfor
    option              http-server-close
    timeout connect     10s
    timeout client      30s
    timeout server      30s
    timeout queue       10s
    timeout http-request 10s
    timeout http-keep-alive 10s
    timeout check       5s
    retries             3

# TLS-terminating frontend on loopback only. Operators expose by
# editing the `bind` lines below.
frontend https_in
    bind 127.0.0.1:443 ssl crt /etc/haproxy/ssl/server.pem alpn h2,http/1.1
    bind [::1]:443     ssl crt /etc/haproxy/ssl/server.pem alpn h2,http/1.1
    bind quic4@127.0.0.1:443 ssl crt /etc/haproxy/ssl/server.pem alpn h3

    http-response set-header Strict-Transport-Security "max-age=63072000"
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options DENY
    http-response set-header Referrer-Policy no-referrer

    default_backend default_be

# HTTP-only frontend on loopback only (redirects to HTTPS).
frontend http_in
    bind 127.0.0.1:80
    bind [::1]:80
    http-request redirect scheme https code 301

# Default backend — placeholder; operators replace with real upstream
# servers. The 127.0.0.1:8000 target is unreachable by default so a
# fresh install fails-closed rather than misrouting traffic.
backend default_be
    server local 127.0.0.1:8000 check inter 5s fall 3 rise 2

# Stats / Prometheus endpoint — loopback-locked + Basic Auth. The
# Basic Auth credentials are the safety belt; operators set their own
# via `userlist` + `acl AuthOk http_auth(stats_users)`.
frontend stats
    bind 127.0.0.1:8404
    bind [::1]:8404
    mode http
    http-request use-service prometheus-exporter if { path /metrics }

    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if { src 127.0.0.1 }
    stats hide-version
    stats realm "HAProxy Statistics"
    stats auth admin:changeme   # operator MUST replace before exposing
