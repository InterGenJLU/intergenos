name: chrome-helper
version: "1.0"
release: 1
description: Helper to download and install Google Chrome
license: GPL-3.0-or-later
payload_license: LicenseRef-Google-Chrome-ToS
homepage: https://www.google.com/chrome/
tier: extra
build_style: custom
install_func: do_install
source: []
dependencies:
  build: []
  host: []
  runtime:
  # H-007: chrome-helper sources /usr/share/igos/helpers/helper-lib.sh
  # at the top of the install-helper script. intergenos-helper-lib
  # must be installed before this helper is invoked.
  - intergenos-helper-lib
  - nodejs
verify_paths:
  - /usr/bin/igos-install-chrome
