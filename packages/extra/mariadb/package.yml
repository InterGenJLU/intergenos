name: mariadb
version: "11.8.6"
release: 2
description: MariaDB 11.8 LTS — GPL-2.0 relational database server (MySQL-compatible)
license: "GPL-2.0 AND LGPL-2.1"
homepage: https://mariadb.org/
tier: extra
build_style: cmake
install_func: do_install
source:
- url: https://archive.mariadb.org/mariadb-${version}/source/mariadb-${version}.tar.gz
  sha256: b126581a8ca89376d2a3ce63fee97c114c3e15315345e769b9d00c51e1b7d619
- url: https://github.com/fmtlib/fmt/releases/download/12.1.0/fmt-12.1.0.zip
  sha256: 695fd197fa5aff8fc67b5f2bbc110490a875cdf7a41686ac8512fb480fa8ada7
  extract: false  # cmake ExternalProject expects a zip artifact, not extracted contents
dependencies:
  build:
  - cmake
  - ninja
  - bison-core
  - flex
  - pkgconf
  - openssl
  - zlib
  - readline
  - ncurses-core
  - libxml2
  - pcre2
  - jemalloc
  - mitkrb
  - linux-pam
  host: []
  runtime:
  - openssl
  - zlib
  - readline
  - ncurses-core
  - libxml2
  - pcre2
  - jemalloc
  - mitkrb
  - linux-pam
verify_paths:
  - /usr/bin/mariadb
  - /etc/logrotate.d/mariadb
  - /usr/bin/mariadb-access
