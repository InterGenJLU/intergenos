name: gimp
version: "3.0.6"
release: 1
description: GNU Image Manipulation Program — advanced image editor
license: GPL-3.0-or-later
homepage: https://www.gimp.org/
tier: extra
build_style: custom
install_func: do_install
source:
- url: https://download.gimp.org/gimp/v3.0/gimp-${version}.tar.xz
  sha256: 246c225383c72ef9f0dc7703b7d707084bbf177bd2900e94ce466a62862e296b
patches:
  - file: gimp-3.0.6-security_fixes-1.patch
    sha256: e2c35c2206869c44e5e290b990b61df25eef01f32eae4997495395f4593ba097
dependencies:
  build:
  - appstream-glib
  - gegl
  - gexiv2
  - glib-networking
  - gtk3
  - harfbuzz
  - libmypaint
  - mypaint-brushes
  - librsvg
  - libtiff
  - libxml2
  - lcms2
  - poppler
  - graphviz
  - iso-codes
  - libgudev
  - pygobject3
  - xdg-utils
  - alsa-lib
  - gjs
  - libheif
  - libwebp
  - lua
  - openjpeg2
  - appstream
  - cairo
  - exiv2
  - freetype2
  - gdk-pixbuf
  - glib2
  - gobject-introspection
  - json-glib
  - libX11
  - libXext
  - libXfixes
  - libXmu
  - libarchive
  - libjpeg-turbo
  - libpng
  - xz
  - zlib
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "no display in chroot — save-and-export, single-window-mode, and ui tests require a display server (BLFS-known)."
