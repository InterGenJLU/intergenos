# Lighttpd default configuration — TLS-only, localhost-only
server.modules = (
    "mod_access",
    "mod_accesslog",
    "mod_alias",
    "mod_compress",
    "mod_openssl",
    "mod_redirect",
    "mod_setenv",
)

server.document-root        = "/var/lib/lighttpd/html"
server.errorlog             = "/var/log/lighttpd/error.log"
server.pid-file             = "/run/lighttpd/lighttpd.pid"
server.username             = "lighttpd"
server.groupname            = "lighttpd"
server.port                 = 443
server.bind                 = "127.0.0.1"
server.tag                  = ""
server.follow-symlink       = "disable"
dir-listing.activate        = "disable"

ssl.engine                  = "enable"
ssl.privkey                 = "/etc/ssl/private/lighttpd-selfsigned.pem"
ssl.pemfile                 = "/etc/ssl/private/lighttpd-selfsigned.pem"

index-file.names            = ( "index.html" )
url.access-deny             = ( "~", ".inc" )
static-file.exclude-extensions = ( ".php", ".pl", ".py", ".fcgi" )

include_shell "/usr/share/lighttpd/create-mime.conf.pl"
include "/etc/lighttpd/conf.d/*.conf"
