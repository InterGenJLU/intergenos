name: mpv
version: "0.41.0"
release: 1
description: Free media player for the command line and desktop
license: GPL-2.0-or-later
homepage: https://mpv.io/
tier: extra
build_style: meson
install_func: do_install
source:
- url: https://github.com/mpv-player/mpv/archive/v${version}/mpv-${version}.tar.gz
  sha256: FIXME
dependencies:
  build:
  - ffmpeg
  - libplacebo
  - alsa-lib
  - pulseaudio
  - libva
  - libass
  - luajit
  - uchardet
  - libdvdnav
  - mesa
  - wayland
  host: []
  runtime: []
