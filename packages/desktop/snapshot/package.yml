name: snapshot
# GNOME 49 alignment: 50.0 added a glycin-gtk4-2 pkg-config dep that
# requires GNOME 50 stack. 49.1 only needs plain glycin (which we ship).
version: '49.1'
release: 1
description: GNOME camera application
license: GPL-3.0-or-later
homepage: https://apps.gnome.org/Snapshot/
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://download.gnome.org/sources/snapshot/49/snapshot-${version}.tar.xz
  sha256: 3558f6f8e0d38b2950b6bad9b9eec238249bedfedce70fb58a28cad6945e6ce9
# Pre-vendored Cargo crates (offline chroot, by security design). Generated
# via `cargo vendor` on build VM with rustup cargo 1.95.
- url: https://intergenstudios.com/intergenos/sources/current/snapshot-${version}-vendor.tar.gz
  sha256: 5b3b6ae56d10370fadca8e7d02e723bf526263c9705ac2d97d81cc4e164402db
dependencies:
  build:
  - gtk4
  - libadwaita1
  - glycin
  - gstreamer
  - gst-plugins-base
  - lcms2
  - libseccomp
  - rust
  - gst-plugins-bad
  - glib2
  - gst-plugins-base-pass2
  host: []
  runtime: []
verify_paths:
  - /usr/bin/snapshot
  - /usr/share/snapshot
