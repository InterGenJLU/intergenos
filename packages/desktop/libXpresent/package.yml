name: libXpresent
version: 1.0.1
release: 1
description: X Present extension library
license: MIT
homepage: https://www.x.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.x.org/pub/individual/lib/libXpresent-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libXfixes
  - libXrandr
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
