name: iptables
version: "1.8.12"
release: 2
description: iptables CLI compat shim — translates iptables syntax to nftables rules
license: GPL-2.0-or-later
homepage: https://www.netfilter.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.netfilter.org/projects/iptables/files/iptables-${version}.tar.xz
  sha256: 8e7ee962601492de6503d171d4a948092ab18f89f111de72e3037c1f40cfb846
dependencies:
  build:
  - libpcap
  - libnftnl
  - libmnl
  host: []
  runtime: []
# InterGenOS uses nftables exclusively. This package is built as the
# iptables-nft compat shim only — the userspace iptables CLI translates
# rules to nftables under the hood. The iptables-LEGACY backend is NOT
# built because the kernel disables CONFIG_NETFILTER_XTABLES_LEGACY.
# See: docs/research/networking/nftables_only_decision.md
configure_flags:
- --prefix=/usr
- --enable-nftables
verify_paths:
  - /usr/sbin/iptables
  - /usr/sbin/ip6tables
  - /usr/lib/libip4tc.so
