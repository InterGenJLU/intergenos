# InterGenOS Desktop Tier 1c — Rust toolchain, LLVM, SPIR-V, Mesa
# These are the heaviest builds in the desktop stack.
# Source: BLFS 13.0

tier: desktop

packages:
  # --- Rust toolchain ---
  - name: rust
    version: "1.82.0"
    url: https://static.rust-lang.org/dist/rustc-${version}-src.tar.xz
    license: MIT
    description: Rust programming language
    homepage: https://www.rust-lang.org/
    build_style: custom

  - name: cbindgen
    version: "0.27.0"
    url: https://github.com/mozilla/cbindgen/archive/v${version}/cbindgen-${version}.tar.gz
    license: MPL-2.0
    description: C bindings generator for Rust
    build_style: custom
    deps:
      build:
        - rust

  - name: rust-bindgen
    version: "0.70.1"
    url: https://github.com/nickvank/rust-bindgen/archive/v${version}/rust-bindgen-${version}.tar.gz
    license: BSD-3-Clause
    description: Rust FFI bindings generator
    build_style: custom
    deps:
      build:
        - rust

  # --- LLVM ---
  - name: llvm
    version: "19.1.7"
    url: https://github.com/llvm/llvm-project/releases/download/llvmorg-${version}/llvm-project-${version}.src.tar.xz
    license: Apache-2.0
    description: LLVM compiler infrastructure
    homepage: https://llvm.org/
    build_style: cmake
    cmake_flags:
      - "CMAKE_INSTALL_PREFIX=/usr"
      - "CMAKE_BUILD_TYPE=Release"
      - "LLVM_ENABLE_PROJECTS=clang"
      - "LLVM_ENABLE_RTTI=ON"
      - "LLVM_BUILD_LLVM_DYLIB=ON"
      - "LLVM_LINK_LLVM_DYLIB=ON"
      - "LLVM_TARGETS_TO_BUILD=host;AMDGPU;BPF"
      - "CLANG_DEFAULT_PIE_ON_LINUX=ON"

  # --- SPIR-V chain (needed by Mesa) ---
  - name: spirv-headers
    version: "1.3.290.0"
    url: https://github.com/KhronosGroup/SPIRV-Headers/archive/vulkan-sdk-${version}/spirv-headers-${version}.tar.gz
    license: MIT
    description: SPIR-V headers
    build_style: cmake

  - name: spirv-tools
    version: "1.3.290.0"
    url: https://github.com/KhronosGroup/SPIRV-Tools/archive/vulkan-sdk-${version}/spirv-tools-${version}.tar.gz
    license: Apache-2.0
    description: SPIR-V tools
    build_style: cmake
    deps:
      build:
        - spirv-headers

  - name: spirv-llvm-translator
    version: "19.1.7"
    url: https://github.com/KhronosGroup/SPIRV-LLVM-Translator/archive/v${version}/spirv-llvm-translator-${version}.tar.gz
    license: Apache-2.0
    description: SPIR-V to LLVM IR translator
    build_style: cmake
    deps:
      build:
        - llvm
        - spirv-tools

  - name: libclc
    version: "19.1.7"
    url: https://github.com/llvm/llvm-project/releases/download/llvmorg-${version}/libclc-${version}.src.tar.xz
    license: Apache-2.0
    description: OpenCL C library
    build_style: cmake
    deps:
      build:
        - llvm
        - spirv-llvm-translator

  # --- Vulkan ---
  - name: vulkan-headers
    version: "1.3.290.0"
    url: https://github.com/KhronosGroup/Vulkan-Headers/archive/vulkan-sdk-${version}/vulkan-headers-${version}.tar.gz
    license: Apache-2.0
    description: Vulkan API headers
    build_style: cmake

  - name: vulkan-loader
    version: "1.3.290.0"
    url: https://github.com/KhronosGroup/Vulkan-Loader/archive/vulkan-sdk-${version}/vulkan-loader-${version}.tar.gz
    license: Apache-2.0
    description: Vulkan ICD loader
    build_style: cmake
    deps:
      build:
        - vulkan-headers
        - libX11
        - libXrandr
        - wayland

  - name: glslang
    version: "15.1.0"
    url: https://github.com/KhronosGroup/glslang/archive/${version}/glslang-${version}.tar.gz
    license: Apache-2.0
    description: GLSL/HLSL to SPIR-V compiler
    build_style: cmake
    cmake_flags:
      - "CMAKE_INSTALL_PREFIX=/usr"
      - "CMAKE_BUILD_TYPE=Release"
      - "BUILD_SHARED_LIBS=ON"
      - "ALLOW_EXTERNAL_SPIRV_TOOLS=ON"
    deps:
      build:
        - spirv-tools
        - spirv-headers

  # --- Mesa ---
  - name: mesa
    version: "24.3.4"
    url: https://mesa.freedesktop.org/archive/mesa-${version}.tar.xz
    license: MIT
    description: OpenGL, Vulkan, and OpenCL implementation
    homepage: https://www.mesa3d.org/
    build_style: meson
    meson_flags:
      - "-Dplatforms=x11,wayland"
      - "-Dgallium-drivers=radeonsi,nouveau,swrast,iris,zink"
      - "-Dvulkan-drivers=amd,intel,swrast"
      - "-Dvulkan-layers=device-select,overlay"
      - "-Dglx=dri"
      - "-Degl=enabled"
      - "-Dllvm=enabled"
      - "-Dgbm=enabled"
      - "-Dgles2=enabled"
      - "-Dvalgrind=disabled"
    deps:
      build:
        - libdrm
        - libX11
        - libXext
        - libXfixes
        - libXrandr
        - libxshmfence
        - libxcb
        - libxkbcommon
        - wayland-protocols
        - llvm
        - Mako
        - glslang
        - vulkan-headers
        - vulkan-loader
        - cbindgen
        - rust-bindgen
        - libclc

  # --- Video acceleration ---
  - name: libva
    version: "2.22.0"
    url: https://github.com/intel/libva/releases/download/${version}/libva-${version}.tar.bz2
    license: MIT
    description: Video Acceleration API
    homepage: https://github.com/intel/libva
    build_style: meson
    deps:
      build:
        - libdrm
        - libX11
        - wayland
        - mesa
