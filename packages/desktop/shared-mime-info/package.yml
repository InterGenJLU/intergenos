name: shared-mime-info
version: '2.4'
release: 1
description: Core MIME type database
license: GPL-2.0-or-later
homepage: https://www.freedesktop.org/wiki/Software/shared-mime-info/
tier: desktop
build_style: meson
install_func: do_install
configure_flags:
- -Dupdate-mimedb=true
source:
- url: https://gitlab.freedesktop.org/xdg/shared-mime-info/-/archive/${version}/shared-mime-info-${version}.tar.gz
  sha256: 531291d0387eb94e16e775d7e73788d06d2b2fdd8cd2ac6b6b15287593b6a2de
dependencies:
  build:
  - glib2
  - libxml2
  host: []
  runtime: []
verify_paths:
  - /usr/bin/update-mime-database
  - /usr/share/mime
