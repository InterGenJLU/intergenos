name: sdl2-ttf
version: 2.24.0
release: 1
description: TrueType font rendering library for SDL2
license: Zlib
homepage: https://www.libsdl.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://github.com/libsdl-org/SDL_ttf/releases/download/release-${version}/SDL2_ttf-${version}.tar.gz
  sha256: 0b2bf1e7b6568adbdbc9bb924643f79d9dedafe061fa1ed687d1d9ac4e453bfd
dependencies:
  build:
  - sdl2
  - freetype2
  - harfbuzz
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
verify_paths:
  - /usr/lib/libSDL2_ttf.so
  - /usr/lib/pkgconfig/SDL2_ttf.pc
