# InterGenOS Desktop Tier 4 — GTK Stack, Audio, GStreamer, Desktop Services
# Source: BLFS 13.0

tier: desktop

packages:
  # --- GDK-Pixbuf and image loading ---
  - name: gdk-pixbuf
    version: "2.42.12"
    url: https://download.gnome.org/sources/gdk-pixbuf/2.42/gdk-pixbuf-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: Image loading library for GTK
    homepage: https://wiki.gnome.org/Projects/GdkPixbuf
    build_style: meson
    meson_flags:
      - "-Dman=false"
    deps:
      build:
        - shared-mime-info
        - libjpeg-turbo
        - libpng
        - libtiff

  - name: librsvg
    version: "2.59.2"
    url: https://download.gnome.org/sources/librsvg/2.59/librsvg-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: SVG rendering library
    homepage: https://wiki.gnome.org/Projects/LibRsvg
    build_style: custom
    deps:
      build:
        - cairo
        - gdk-pixbuf
        - pango
        - vala

  # --- Accessibility ---
  - name: at-spi2-core
    version: "2.54.0"
    url: https://download.gnome.org/sources/at-spi2-core/2.54/at-spi2-core-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: Assistive Technology Service Provider Interface
    homepage: https://wiki.gnome.org/Accessibility
    build_style: meson
    deps:
      build:
        - libX11
        - libXi
        - libXtst

  # --- Graphene ---
  - name: graphene
    version: "1.10.8"
    url: https://download.gnome.org/sources/graphene/1.10/graphene-${version}.tar.xz
    license: MIT
    description: Graphics data types library
    homepage: https://ebassi.github.io/graphene/
    build_style: meson
    meson_flags:
      - "-Dinstalled_tests=false"

  # --- DConf/GSettings ---
  - name: gsettings-desktop-schemas
    version: "47.1"
    url: https://download.gnome.org/sources/gsettings-desktop-schemas/47/gsettings-desktop-schemas-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: GSettings schemas for GNOME desktop
    homepage: https://gitlab.gnome.org/GNOME/gsettings-desktop-schemas
    build_style: meson

  # --- GTK3 ---
  - name: gtk3
    version: "3.24.43"
    url: https://download.gnome.org/sources/gtk+/3.24/gtk+-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: GTK 3 widget toolkit
    homepage: https://www.gtk.org/
    build_style: meson
    meson_flags:
      - "-Dman=false"
      - "-Dbroadway_backend=true"
    deps:
      build:
        - at-spi2-core
        - gdk-pixbuf
        - libepoxy
        - pango
        - libXi
        - libXrandr
        - libXcursor
        - libXinerama
        - libXcomposite
        - libXdamage
        - wayland
        - wayland-protocols
        - libxkbcommon
        - iso-codes

  # --- GTK4 ---
  - name: gtk4
    version: "4.16.12"
    url: https://download.gnome.org/sources/gtk/4.16/gtk-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: GTK 4 widget toolkit
    homepage: https://www.gtk.org/
    build_style: meson
    meson_flags:
      - "-Dbroadway-backend=true"
      - "-Dintrospection=enabled"
      - "-Dbuild-testsuite=false"
      - "-Dbuild-tests=false"
    deps:
      build:
        - gdk-pixbuf
        - graphene
        - iso-codes
        - libepoxy
        - librsvg
        - pango
        - pygobject3
        - wayland-protocols
        - libxkbcommon
        - cairo
        - libXi
        - libXrandr
        - libXcursor

  # --- Adwaita icon theme ---
  - name: adwaita-icon-theme
    version: "47.0"
    url: https://download.gnome.org/sources/adwaita-icon-theme/47/adwaita-icon-theme-${version}.tar.xz
    license: LGPL-3.0-or-later
    description: GNOME default icon theme
    homepage: https://gitlab.gnome.org/GNOME/adwaita-icon-theme
    build_style: meson
    deps:
      build:
        - gtk3

  # --- Notifications ---
  - name: libnotify
    version: "0.8.4"
    url: https://download.gnome.org/sources/libnotify/0.8/libnotify-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: Desktop notification library
    homepage: https://gitlab.gnome.org/GNOME/libnotify
    build_style: meson
    meson_flags:
      - "-Dman=false"
      - "-Dgtk_doc=false"
      - "-Ddocbook_docs=disabled"
    deps:
      build:
        - gdk-pixbuf
        - gtk4

  # --- libadwaita ---
  - name: appstream
    version: "1.0.4"
    url: https://www.freedesktop.org/software/appstream/releases/AppStream-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: AppStream metadata handling library
    homepage: https://www.freedesktop.org/wiki/Distributions/AppStream/
    build_style: meson
    meson_flags:
      - "-Dstemming=false"
      - "-Dapidocs=false"
    deps:
      build:
        - libxmlb
        - libxml2
        - libyaml

  - name: sassc
    version: "3.6.2"
    url: https://github.com/sass/sassc/archive/${version}/sassc-${version}.tar.gz
    license: MIT
    description: SASS CSS preprocessor compiler
    homepage: https://github.com/sass/sassc
    build_style: custom

  - name: libadwaita1
    version: "1.6.2"
    url: https://download.gnome.org/sources/libadwaita/1.6/libadwaita-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: GTK4 adaptive widgets library
    homepage: https://gnome.pages.gitlab.gnome.org/libadwaita/
    build_style: meson
    meson_flags:
      - "-Dexamples=false"
      - "-Dtests=false"
    deps:
      build:
        - appstream
        - gtk4
        - sassc
        - vala

  # --- Audio stack ---
  - name: alsa-lib
    version: "1.2.13"
    url: https://www.alsa-project.org/files/pub/lib/alsa-lib-${version}.tar.bz2
    license: LGPL-2.1-or-later
    description: ALSA sound library
    homepage: https://www.alsa-project.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"

  - name: alsa-plugins
    version: "1.2.12"
    url: https://www.alsa-project.org/files/pub/plugins/alsa-plugins-${version}.tar.bz2
    license: LGPL-2.1-or-later
    description: ALSA plugin collection
    homepage: https://www.alsa-project.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
    deps:
      build:
        - alsa-lib

  - name: alsa-utils
    version: "1.2.13"
    url: https://www.alsa-project.org/files/pub/utils/alsa-utils-${version}.tar.bz2
    license: GPL-2.0-or-later
    description: ALSA utilities
    homepage: https://www.alsa-project.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-alsaconf"
      - "--with-udev-rules-dir=/usr/lib/udev/rules.d"
    deps:
      build:
        - alsa-lib

  - name: pulseaudio
    version: "17.0"
    url: https://www.freedesktop.org/software/pulseaudio/releases/pulseaudio-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: PulseAudio sound server
    homepage: https://www.freedesktop.org/wiki/Software/PulseAudio/
    build_style: meson
    meson_flags:
      - "-Dtests=false"
    deps:
      build:
        - alsa-lib
        - libsndfile
        - speex

  - name: pipewire
    version: "1.2.7"
    url: https://github.com/PipeWire/pipewire/archive/${version}/pipewire-${version}.tar.gz
    license: MIT
    description: Multimedia processing framework
    homepage: https://pipewire.org/
    build_style: meson
    meson_flags:
      - "-Dsession-managers=[]"
      - "-Dtests=disabled"
      - "-Dman=disabled"
    deps:
      build:
        - alsa-lib

  - name: wireplumber
    version: "0.5.7"
    url: https://gitlab.freedesktop.org/pipewire/wireplumber/-/archive/${version}/wireplumber-${version}.tar.gz
    license: MIT
    description: PipeWire session manager
    homepage: https://pipewire.pages.freedesktop.org/wireplumber/
    build_style: meson
    meson_flags:
      - "-Dsystem-lua=true"
      - "-Dtests=disabled"
      - "-Ddoc=disabled"
    deps:
      build:
        - pipewire

  # --- GStreamer ---
  - name: gstreamer
    version: "1.24.10"
    url: https://gstreamer.freedesktop.org/src/gstreamer/gstreamer-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: GStreamer multimedia framework
    homepage: https://gstreamer.freedesktop.org/
    build_style: meson
    meson_flags:
      - "-Dtests=disabled"
      - "-Dexamples=disabled"
      - "-Ddoc=disabled"

  - name: gst-plugins-base
    version: "1.24.10"
    url: https://gstreamer.freedesktop.org/src/gst-plugins-base/gst-plugins-base-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: GStreamer base plugins
    homepage: https://gstreamer.freedesktop.org/
    build_style: meson
    meson_flags:
      - "-Dtests=disabled"
      - "-Dexamples=disabled"
      - "-Ddoc=disabled"
    deps:
      build:
        - gstreamer
        - alsa-lib
        - libogg
        - libvorbis
        - pango
        - libX11
        - libXext

  - name: gst-plugins-good
    version: "1.24.10"
    url: https://gstreamer.freedesktop.org/src/gst-plugins-good/gst-plugins-good-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: GStreamer good plugins
    homepage: https://gstreamer.freedesktop.org/
    build_style: meson
    meson_flags:
      - "-Dtests=disabled"
      - "-Dexamples=disabled"
      - "-Ddoc=disabled"
    deps:
      build:
        - gst-plugins-base
        - cairo
        - flac
        - lame
        - libpng
        - pulseaudio

  - name: gst-plugins-bad
    version: "1.24.10"
    url: https://gstreamer.freedesktop.org/src/gst-plugins-bad/gst-plugins-bad-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: GStreamer bad plugins
    homepage: https://gstreamer.freedesktop.org/
    build_style: meson
    meson_flags:
      - "-Dtests=disabled"
      - "-Dexamples=disabled"
      - "-Ddoc=disabled"
    deps:
      build:
        - gst-plugins-base
        - soundtouch

  # --- FFmpeg ---
  - name: ffmpeg
    version: "7.1"
    url: https://ffmpeg.org/releases/ffmpeg-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: Complete multimedia framework
    homepage: https://ffmpeg.org/
    build_style: custom
    deps:
      build:
        - nasm
        - alsa-lib
        - dav1d
        - fdk-aac
        - lame
        - libvpx
        - svt-av1
        - x264
        - x265
        - opus

  # --- Polkit ---
  - name: polkit
    version: "125"
    url: https://github.com/polkit-org/polkit/archive/${version}/polkit-${version}.tar.gz
    license: LGPL-2.0-or-later
    description: PolicyKit authorization toolkit
    homepage: https://github.com/polkit-org/polkit
    build_style: meson
    meson_flags:
      - "-Dtests=false"
      - "-Dman=false"
      - "-Djs_engine=duktape"

  # --- GLib networking and libsoup ---
  - name: glib-networking
    version: "2.80.1"
    url: https://download.gnome.org/sources/glib-networking/2.80/glib-networking-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: GIO networking extensions
    homepage: https://gitlab.gnome.org/GNOME/glib-networking
    build_style: meson
    deps:
      build:
        - gnutls
        - gsettings-desktop-schemas

  - name: gnutls
    version: "3.8.8"
    url: https://www.gnupg.org/ftp/gcrypt/gnutls/v3.8/gnutls-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: GNU TLS library
    homepage: https://gnutls.org/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--disable-static"
      - "--with-default-trust-store-pkcs11=pkcs11:"
    deps:
      build:
        - nettle

  - name: libsoup3
    version: "3.6.4"
    url: https://download.gnome.org/sources/libsoup/3.6/libsoup-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: HTTP client/server library for GNOME
    homepage: https://wiki.gnome.org/Projects/libsoup
    build_style: meson
    meson_flags:
      - "-Dtests=false"
      - "-Ddocs=disabled"
    deps:
      build:
        - glib-networking
        - vala

  # --- Portal infrastructure ---
  - name: libportal
    version: "0.8.1"
    url: https://github.com/nickvank/libportal/releases/download/${version}/libportal-${version}.tar.xz
    license: LGPL-3.0-or-later
    description: Flatpak portal library
    homepage: https://github.com/nickvank/libportal
    build_style: meson
    meson_flags:
      - "-Ddocs=false"
      - "-Dtests=false"
    deps:
      build:
        - gtk3
        - gtk4

  - name: bubblewrap
    version: "0.10.0"
    url: https://github.com/containers/bubblewrap/releases/download/v${version}/bubblewrap-${version}.tar.xz
    license: LGPL-2.0-or-later
    description: Unprivileged sandboxing tool
    homepage: https://github.com/containers/bubblewrap
    build_style: meson

  - name: xdg-dbus-proxy
    version: "0.1.6"
    url: https://github.com/nickvank/xdg-dbus-proxy/releases/download/${version}/xdg-dbus-proxy-${version}.tar.xz
    license: LGPL-2.1-or-later
    description: D-Bus proxy for sandboxed applications
    homepage: https://github.com/nickvank/xdg-dbus-proxy
    build_style: meson

  - name: xdg-user-dirs
    version: "0.18"
    url: https://user-dirs.freedesktop.org/releases/xdg-user-dirs-${version}.tar.gz
    license: GPL-2.0-or-later
    description: XDG user directory management
    homepage: https://www.freedesktop.org/wiki/Software/xdg-user-dirs/
    build_style: autotools
    configure_flags:
      - "--prefix=/usr"
      - "--sysconfdir=/etc"
