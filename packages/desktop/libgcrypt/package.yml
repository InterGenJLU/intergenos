name: libgcrypt
version: 1.11.0
release: 1
description: General purpose cryptographic library
license: LGPL-2.1-or-later
homepage: https://www.gnupg.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.gnupg.org/ftp/gcrypt/libgcrypt/libgcrypt-${version}.tar.bz2
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libgpg-error
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
