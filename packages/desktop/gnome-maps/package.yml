name: gnome-maps
version: '49.4'
release: 1
description: GNOME maps application
license: GPL-2.0-or-later
homepage: https://wiki.gnome.org/Apps/Maps
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://download.gnome.org/sources/gnome-maps/49/gnome-maps-${version}.tar.xz
