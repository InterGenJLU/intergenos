name: alsa-utils
version: "1.2.15.2"
release: 1
description: ALSA utilities
license: GPL-2.0-or-later
homepage: https://www.alsa-project.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.alsa-project.org/files/pub/utils/alsa-utils-${version}.tar.bz2
  sha256: 7aaaafbfb01942113ec0c31e51f705910e81079205088ca2f8f137a3869e1a3a
dependencies:
  build:
  - alsa-lib
  - docutils
  - libsamplerate
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-alsaconf
- --with-udev-rules-dir=/usr/lib/udev/rules.d
verify_paths:
  - /usr/bin/aconnect
  - /usr/lib/alsa-topology
