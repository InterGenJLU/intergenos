name: ibus
version: 1.5.31
release: 1
description: Intelligent Input Bus framework
license: LGPL-2.1-or-later
homepage: ''
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://github.com/nickvank/ibus/releases/download/${version}/ibus-${version}.tar.gz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - dconf
  - gtk3
  - gtk4
  - iso-codes
  - vala
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --sysconfdir=/etc
