name: gnome-settings-daemon
version: '47.1'
release: 1
description: GNOME settings daemon
license: GPL-2.0-or-later
homepage: https://gitlab.gnome.org/GNOME/gnome-settings-daemon
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://download.gnome.org/sources/gnome-settings-daemon/47/gnome-settings-daemon-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - alsa-lib
  - colord
  - fontconfig
  - gcr4
  - geoclue2
  - gnome-desktop
  - libcanberra
  - libgweather
  - libnotify
  - pulseaudio
  - upower
  - networkmanager
  - wayland
  host: []
  runtime: []
