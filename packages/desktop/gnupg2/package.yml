name: gnupg2
version: 2.4.7
release: 1
description: GNU Privacy Guard
license: GPL-3.0-or-later
homepage: https://www.gnupg.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.gnupg.org/ftp/gcrypt/gnupg/gnupg-${version}.tar.bz2
  sha256: 7b24706e4da7e0e3b06ca068231027401f238102c41c909631349dcc3b85eb46
dependencies:
  build:
  - libassuan
  - libgcrypt
  - libksba
  - npth
  - gnutls
  - pinentry
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --localstatedir=/var
- --sysconfdir=/etc
