name: libogg
version: "1.3.6"
release: 1
description: Ogg bitstream container library
license: BSD-3-Clause
homepage: https://www.xiph.org/ogg/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://downloads.xiph.org/releases/ogg/libogg-${version}.tar.xz
  sha256: 5c8253428e181840cd20d41f3ca16557a9cc04bad4a3d04cce84808677fa1061
dependencies:
  build: []
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
- --docdir=/usr/share/doc/libogg-${version}
verify_paths:
  - /usr/lib/libogg.so
