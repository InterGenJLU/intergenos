name: libogg
version: 1.3.5
release: 1
description: Ogg bitstream container library
license: BSD-3-Clause
homepage: https://www.xiph.org/ogg/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://downloads.xiph.org/releases/ogg/libogg-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build: []
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
- --docdir=/usr/share/doc/libogg-${version}
