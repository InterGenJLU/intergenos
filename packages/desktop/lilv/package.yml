name: lilv
version: "0.26.4"
release: 1
description: LV2 plugin host library — discovers, loads, and runs LV2 plugins
license: ISC
homepage: https://gitlab.com/lv2/lilv
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://download.drobilla.net/lilv-${version}.tar.xz
  sha256: 1c8b5fcb78718173e67d76e51ad423f5113a9ff68463f2566195ae46396089e3
dependencies:
  build:
  - lv2
  - zix
  - serd
  - sord
  - sratom
  host: []
  runtime: []
verify_paths:
  - /etc/bash_completion.d/lilv
  - /usr/lib/liblilv-0.so
  - /usr/lib/liblilv-0.so.0
