name: libICE
version: 1.1.2
release: 1
description: Inter-Client Exchange library
license: MIT
homepage: https://www.x.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.x.org/pub/individual/lib/libICE-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - xorgproto
  - xtrans
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
- ICE_LIBS=-lpthread
