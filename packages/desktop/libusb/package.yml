name: libusb
version: 1.0.27
release: 1
description: USB access library
license: LGPL-2.1-or-later
homepage: https://libusb.info/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://github.com/libusb/libusb/releases/download/v${version}/libusb-${version}.tar.bz2
  sha256: NEEDS_CHECKSUM
dependencies:
  build: []
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
