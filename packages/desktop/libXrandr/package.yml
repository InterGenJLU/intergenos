name: libXrandr
version: 1.5.4
release: 1
description: X Resize and Rotate extension library
license: MIT
homepage: https://www.x.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.x.org/pub/individual/lib/libXrandr-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libXrender
  - libXext
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
