name: x264
version: '20241226'
release: 1
description: H.264/AVC video encoder
license: GPL-2.0-or-later
homepage: https://www.videolan.org/developers/x264.html
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://anduin.linuxfromscratch.org/BLFS/x264/x264-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - nasm
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --enable-shared
- --disable-cli
