name: systemd-pass2
version: "259.1"
release: 1
description: "Systemd (pass 2 — rebuild with PAM support for GNOME/GDM)"
license: LGPL-2.1-or-later
homepage: https://www.freedesktop.org/wiki/Software/systemd/
tier: desktop
build_style: custom
install_func: do_install
direct_install: true
source:
- url: https://github.com/systemd/systemd/archive/v${version}/systemd-${version}.tar.gz
  sha256: 7af4f36db512ad2f0f749a0f9886370edeb2bb5128014fc47cdf73702c7e1911
dependencies:
  build:
  - linux-pam
  - polkit
  - apparmor       # LSM enforcement. Security-critical. Build #5 audit:
                   # missing from deps → systemd built without libapparmor
                   # → AppArmor profiles cannot load.
  - tpm2-tss       # systemd-cryptenroll --tpm2-device, pcrlock, measured boot.
                   # Security-critical. Build #5 audit: not in package set.
  - libfido2       # systemd-cryptenroll --fido2-device + LUKS unlock.
                   # Security-critical. Build #5 audit: not in package set.
  - libxkbcommon   # vconsole keymap support. Build #5 audit: built after
                   # systemd-pass2 → vconsole keymap broken.
  host: []
  runtime: []

supersedes:
  - systemd
