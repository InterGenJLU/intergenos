name: libcupsfilters
version: 2.0.1
release: 1
description: CUPS filters library
license: Apache-2.0
homepage: ''
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://github.com/OpenPrinting/libcupsfilters/releases/download/${version}/libcupsfilters-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - cups
  - mupdf
  - lcms2
  - poppler
  - qpdf
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
