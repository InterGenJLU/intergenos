name: libvorbis
version: 1.3.7
release: 1
description: Vorbis audio codec library
license: BSD-3-Clause
homepage: https://www.xiph.org/vorbis/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://downloads.xiph.org/releases/vorbis/libvorbis-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libogg
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
