name: user-theme
version: "1.0"
release: 1
description: GNOME Shell user-theme extension (load shell themes from /usr/share/themes/) — needed for InterGenOS shell theme selection
license: GPL-2.0-or-later
homepage: https://gitlab.gnome.org/GNOME/gnome-shell-extensions
tier: desktop
build_style: custom
install_func: do_install
source:
- url: file:///user-theme-${version}.tar.gz
  sha256: 3d9a174ec58e54f2b777d27da6f15e2eb07f4fdeaf3da546c73c87bd3dc8efc0
dependencies:
  build: []
  host: []
  runtime:
  - gnome-shell
verify_paths:
  - /usr/share/gnome-shell/extensions/user-theme@gnome-shell-extensions.gcampax.github.com
  - /usr/share/glib-2.0/schemas/org.gnome.shell.extensions.user-theme.gschema.xml
