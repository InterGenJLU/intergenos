name: cups-filters
version: 2.0.1
release: 1
description: CUPS print filters
license: Apache-2.0
homepage: ''
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://github.com/OpenPrinting/cups-filters/releases/download/${version}/cups-filters-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libcupsfilters
  - libppd
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
