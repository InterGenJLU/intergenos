name: xcb-util-image
version: 0.4.1
release: 1
description: XCB image convenience library
license: MIT
homepage: https://xcb.freedesktop.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://xcb.freedesktop.org/dist/xcb-util-image-${version}.tar.xz
