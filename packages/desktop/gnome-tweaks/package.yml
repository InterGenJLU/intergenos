name: gnome-tweaks
version: '49.0'
release: 1
description: GNOME advanced settings tool
license: GPL-3.0-or-later
homepage: https://wiki.gnome.org/Apps/Tweaks
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://download.gnome.org/sources/gnome-tweaks/49/gnome-tweaks-${version}.tar.xz
