name: gtk4
version: "4.20.3"
release: 1
description: GTK 4 widget toolkit
license: LGPL-2.0-or-later
homepage: https://www.gtk.org/
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://download.gnome.org/sources/gtk/4.20/gtk-${version}.tar.xz
  sha256: 2873f2903088a66c71173ea2ed85ffae266a66b972c3a4842bbb2f6f187ec153
dependencies:
  build:
  - gdk-pixbuf
  - graphene
  - gst-plugins-base-pass2
  - iso-codes
  - libepoxy
  - librsvg
  - pango
  - pygobject3
  - shaderc
  - wayland-protocols
  - libxkbcommon
  - cairo
  - libXi
  - libXrandr
  - libXcursor
  - vulkan-loader
  - gobject-introspection
  - colord
  - cups
  - docutils
  - gst-plugins-bad
  - gst-plugins-good
  - hicolor-icon-theme
  - libcloudproviders
  - libvpx
  - sassc
  - tinysparql
  - fribidi
  - glib2
  - harfbuzz
  - libjpeg-turbo
  - libpng
  - libtiff
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "no display in chroot — gtk4 4.20.3 reports 5,438/5,528 fail with 'Failed to open display' (Build #5 audit). All failures environmental, not regressions."
