name: mesa
version: 25.3.5
release: 1
description: OpenGL, Vulkan, and OpenCL implementation
license: MIT
homepage: https://www.mesa3d.org/
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://mesa.freedesktop.org/archive/mesa-${version}.tar.xz
  sha256: be472413475082df945e0f9be34f5af008baa03eb357e067ce5a611a2d44c44b
patches:
  - mesa-add_xdemos-4.patch
dependencies:
  build:
  - libdrm
  - libX11
  - libXext
  - libXfixes
  - libXrandr
  - libxshmfence
  - libxcb
  - libxkbcommon
  - wayland-protocols
  - llvm
  - Mako
  - glslang
  - vulkan-headers
  - vulkan-loader
  - cbindgen
  - rust-bindgen
  - libclc
  host: []
  runtime: []
