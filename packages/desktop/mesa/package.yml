name: mesa
version: 24.3.4
release: 1
description: OpenGL, Vulkan, and OpenCL implementation
license: MIT
homepage: https://www.mesa3d.org/
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://mesa.freedesktop.org/archive/mesa-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libdrm
  - libX11
  - libXext
  - libXfixes
  - libXrandr
  - libxshmfence
  - libxcb
  - libxkbcommon
  - wayland-protocols
  - llvm
  - Mako
  - glslang
  - vulkan-headers
  - vulkan-loader
  - cbindgen
  - rust-bindgen
  - libclc
  host: []
  runtime: []
