name: libxcb
version: 1.17.0
release: 1
description: X C Binding library
license: MIT
homepage: https://xcb.freedesktop.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://xorg.freedesktop.org/archive/individual/lib/libxcb-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - xcb-proto
  - libXau
  - libXdmcp
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
- --without-doxygen
