name: gnome-desktop
version: '44.1'
release: 1
description: GNOME desktop core library
license: LGPL-2.0-or-later
homepage: https://gitlab.gnome.org/GNOME/gnome-desktop
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://download.gnome.org/sources/gnome-desktop/44/gnome-desktop-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - gsettings-desktop-schemas
  - iso-codes
  - libseccomp
  - xkeyboard-config
  - gtk3
  - gtk4
  host: []
  runtime: []
