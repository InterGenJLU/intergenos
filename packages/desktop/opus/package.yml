name: opus
version: 1.5.2
release: 1
description: Interactive speech and audio codec
license: BSD-3-Clause
homepage: https://opus-codec.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://downloads.xiph.org/releases/opus/opus-${version}.tar.gz
  sha256: NEEDS_CHECKSUM
dependencies:
  build: []
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
