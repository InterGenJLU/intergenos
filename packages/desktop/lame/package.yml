name: lame
version: '3.100'
release: 1
description: MP3 encoder
license: LGPL-2.0-or-later
homepage: https://lame.sourceforge.io/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://downloads.sourceforge.net/lame/lame-${version}.tar.gz
  sha256: NEEDS_CHECKSUM
dependencies:
  build: []
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --enable-mp3rtp
- --disable-static
