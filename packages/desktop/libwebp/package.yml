name: libwebp
version: 1.5.0
release: 1
description: WebP image format library
license: BSD-3-Clause
homepage: https://developers.google.com/speed/webp/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-${version}.tar.gz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libjpeg-turbo
  - libpng
  - libtiff
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
- --enable-libwebpmux
- --enable-libwebpdemux
- --enable-libwebpdecoder
