name: rtkit
version: "0.13"
release: 1
description: RealtimeKit — D-Bus service for real-time scheduling
license: GPL-3.0-or-later
homepage: https://github.com/heftig/rtkit
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://github.com/heftig/rtkit/archive/refs/tags/v${version}/rtkit-${version}.tar.gz
  sha256: 0f9508530868109f0348e044cc1b20893672875467ace6d847ba6364274de003
dependencies:
