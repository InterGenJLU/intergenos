name: libXt
version: "1.3.1"
release: 1
description: X Toolkit Intrinsics library
license: MIT
homepage: https://www.x.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.x.org/pub/individual/lib/libXt-${version}.tar.xz
  sha256: e0a774b33324f4d4c05b199ea45050f87206586d81655f8bef4dba434d931288
dependencies:
  build:
  - libX11
  - libSM
  - libICE
  - xorgproto
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
- --with-appdefaultdir=/etc/X11/app-defaults
