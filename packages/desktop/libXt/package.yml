name: libXt
version: 1.3.1
release: 1
description: X Toolkit Intrinsics library
license: MIT
homepage: https://www.x.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.x.org/pub/individual/lib/libXt-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libX11
  - libSM
  - libICE
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
- --with-appdefaultdir=/etc/X11/app-defaults
