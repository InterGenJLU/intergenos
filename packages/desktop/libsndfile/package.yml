name: libsndfile
version: "1.2.2"
release: 1
description: Library for reading and writing sound files
license: LGPL-2.1-or-later
homepage: https://libsndfile.github.io/libsndfile/
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://github.com/libsndfile/libsndfile/releases/download/${version}/libsndfile-${version}.tar.xz
  sha256: 3799ca9924d3125038880367bf1468e53a1b7e3686a934f098b7e1d286cdb80e
dependencies:
  build:
  - flac
  - libvorbis
  - opus
  - alsa-lib
  - lame
  - mpg123
  - speex
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
verify_paths:
  - /usr/bin/sndfile-cmp
  - /usr/lib/libsndfile.so
