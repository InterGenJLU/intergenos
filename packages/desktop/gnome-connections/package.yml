description: GNOME remote desktop client (VNC and RDP)
license: GPL-3.0-or-later
homepage: https://gitlab.gnome.org/GNOME/connections
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://download.gnome.org/sources/gnome-connections/49/gnome-connections-${version}.tar.xz
