name: mkfontscale
version: "1.2.3"
release: 1
description: Create index of scalable font files
license: MIT
homepage: ''
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.x.org/pub/individual/app/mkfontscale-${version}.tar.xz
