name: gspell
version: "1.14.2"
release: 1
description: Spell checking library for GTK applications
license: LGPL-2.1-or-later
homepage: https://gitlab.gnome.org/GNOME/gspell
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://download.gnome.org/sources/gspell/1.14/gspell-${version}.tar.xz
  sha256: 4ec7e5accc9013281bacd6bbc00006be733818b81ba3fe332c1e876c7e1e1477
dependencies:
  build:
  - enchant
  - icu
  - gtk3
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "no display in chroot — gspell GTK widget tests require a display server."
