name: libXcursor
version: "1.2.3"
release: 1
description: X Cursor management library
license: MIT
homepage: https://www.x.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.x.org/pub/individual/lib/libXcursor-${version}.tar.xz
  sha256: fde9402dd4cfe79da71e2d96bb980afc5e6ff4f8a7d74c159e1966afb2b2c2c0
dependencies:
  build:
  - libXfixes
  - libXrender
  - libX11
  - xorgproto
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static

verify_paths:
  - /usr/lib/libXcursor.so
