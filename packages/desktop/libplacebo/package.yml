name: libplacebo
version: "7.360.0"
release: 1
description: GPU-accelerated image and video processing library
license: LGPL-2.1-or-later
homepage: https://code.videolan.org/videolan/libplacebo
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://github.com/haasn/libplacebo/archive/v${version}/libplacebo-${version}.tar.gz
  sha256: c4c70d430083915a157cb790660749649f58fee1e946c0a6e554fd1cba5a2e8f
dependencies:
  build:
  - glad
  - glslang
  - vulkan-loader
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "no GPU in chroot — libplacebo's GPU test harness requires Vulkan/OpenGL hardware acceleration unavailable during build."
verify_paths:
  - /usr/lib/libplacebo.so
