name: sbc
version: '2.2'
release: 1
description: Bluetooth SBC audio codec
license: LGPL-2.1-or-later
homepage: https://www.kernel.org/pub/linux/bluetooth/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.kernel.org/pub/linux/bluetooth/sbc-${version}.tar.xz
  sha256: a1ada76ef35e5af9c2fbd063754dc9e37a8d989417c6eb1ecebb089b1383ae9e
dependencies:
  build:
  - libsndfile
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
verify_paths:
  - /usr/bin/sbcdec
  - /usr/bin/sbcenc
  - /usr/lib/libsbc.so
