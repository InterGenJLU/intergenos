name: bluez
version: '5.86'
release: 1
description: Bluetooth protocol stack
license: GPL-2.0-or-later
homepage: http://www.bluez.org/
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://www.kernel.org/pub/linux/bluetooth/bluez-${version}.tar.xz
  sha256: 99f144540c6070591e4c53bcb977eb42664c62b7b36cb35a29cf72ded339621d
dependencies:
  build:
  - libical
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --sysconfdir=/etc
- --localstatedir=/var
- --enable-library
- --disable-manpages
