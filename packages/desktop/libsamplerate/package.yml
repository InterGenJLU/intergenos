name: libsamplerate
version: 0.2.2
release: 1
description: Audio sample rate conversion library
license: BSD-2-Clause
homepage: https://libsndfile.github.io/libsamplerate/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://github.com/libsndfile/libsamplerate/releases/download/${version}/libsamplerate-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build: []
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
