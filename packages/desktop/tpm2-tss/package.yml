name: tpm2-tss
version: "4.1.3"
release: 2
description: TCG TPM2 Software Stack — userspace libraries for TPM 2.0 hardware
license: BSD-2-Clause
homepage: https://github.com/tpm2-software/tpm2-tss
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://github.com/tpm2-software/tpm2-tss/releases/download/${version}/tpm2-tss-${version}.tar.gz
  sha256: 37f1580200ab78305d1fc872d89241aaee0c93cbe85bc559bf332737a60d3be8
dependencies:
  build:
  - openssl
  - curl
  - json-c
  host: []
  runtime: []

tests:
  enabled: true
  failure_policy: known_failures
  reason: "tpm2-tss test suite (`make check`) requires a TPM2 simulator (swtpm or Microsoft reference simulator) running on a Unix socket or character device — per upstream README: 'this test suite should only be run against a TPM simulator. If executed against a TPM other than the software simulator it may cause damage to the TPM (NV storage wear out, etc.).' Our chroot has neither a real TPM2 device (no /dev/tpm[rm]?[0-9]) nor a swtpm daemon running, so TCTI initialization aborts at test setup before any test logic executes. Same shape as libuv (refuses-root) and libarchive (nobody+abs-paths) — chroot-environmental, not a code defect."
verify_paths:
  - /usr/lib/libtss2-esys.so
  - /usr/lib/pkgconfig/tss2-esys.pc
