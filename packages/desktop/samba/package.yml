name: samba
version: "4.23.5"
release: 1
description: SMB/CIFS file and print server
license: GPL-3.0-or-later
homepage: https://www.samba.org/
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://www.samba.org/ftp/samba/stable/samba-${version}.tar.gz
  sha256: 593a43ddd0d57902237dfa76888f7b02cb7fc7747111369cb31e126db4836b9f
dependencies:
  build:
  - gnutls
  - gpgme
  - jansson
  - mitkrb
  - openldap
  - perl-parse-yapp
  - rpcsvc-proto
  - fuse3
  - libtirpc
  - linux-pam
  - avahi
  - cups
  - cyrus-sasl
  - git
  - icu
  - libaio
  - libarchive
  - libgcrypt
  - libnsl
  - libtasn1
  - libxslt
  - lmdb
  - markdown
  - nss
  - popt
  - vala
  host: []
  runtime: []
verify_paths:
  - /usr/bin/samba-log-parser
  - /usr/bin/samba-regedit
  - /usr/bin/samba-tool
