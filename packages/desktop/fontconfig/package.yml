name: fontconfig
version: 2.17.1
release: 1
description: Font configuration and customization library
license: MIT
homepage: https://www.freedesktop.org/wiki/Software/fontconfig/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.freedesktop.org/software/fontconfig/release/fontconfig-${version}.tar.xz
  sha256: 74c56b6d4ae602dab6bf290bc85a556ee2abaee1ece250e0fd1699547415c483
dependencies:
  build:
  - freetype2
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --sysconfdir=/etc
- --localstatedir=/var
- --disable-docs
