name: gnome-keyring
version: '47.0'
release: 1
description: GNOME password and secret storage
license: GPL-2.0-or-later
homepage: https://wiki.gnome.org/Projects/GnomeKeyring
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://download.gnome.org/sources/gnome-keyring/47/gnome-keyring-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - gcr4
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --with-pam-dir=/usr/lib/security
