name: libpcap
version: "1.10.6"
release: 1
description: Packet capture library (full — with Bluetooth capture support)
license: BSD-3-Clause
homepage: ''
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.tcpdump.org/release/libpcap-${version}.tar.xz
  sha256: ec97d1206bdd19cb6bdd043eaa9f0037aa732262ec68e070fd7c7b5f834d5dfc
dependencies:
  build:
  - bluez
  - libnl
  - libusb
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
# Second pass of the 2-pass libpcap build. Builds with --enable-bluetooth
# (libpcap auto-detects bluez at configure time). Supersedes
# libpcap-pass1 via migrate-pkm-supersedes.sh — at install time, the
# pkm package manager replaces pass1 with this full build, so the
# installed system has full libpcap with Bluetooth packet capture.
# Owner-approved 2026-05-11.
