name: loupe
version: '49.2'
release: 1
description: GNOME image viewer
license: GPL-3.0-or-later
homepage: https://gitlab.gnome.org/GNOME/loupe
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://download.gnome.org/sources/loupe/49/loupe-${version}.tar.xz
  sha256: 5853e75cceba7fa2bea01be273cd2f0a3061941e7bdfe3a008b233171067142c
# Pre-vendored Cargo crate dependencies. The chroot has no network
# access by security design, so cargo can't fetch from
# index.crates.io at build time. Generated via `cargo vendor` against
# loupe-49.2's Cargo.lock on the build VM (rustup cargo 1.95).
- url: https://intergenstudios.com/intergenos/sources/current/loupe-${version}-vendor.tar.gz
  sha256: 58e44410e7896e9fa941db5b8d590a30eb5d300ccf5857a85043dcb7166d390d
dependencies:
  build:
  - lcms2
  - glycin
  - libadwaita1
  - libgweather
  - libseccomp
  - rust
  - glib2
  - gtk4
  host: []
  runtime: []
