name: intergen-pkm-notifier
version: "1.0"
release: 1
description: GNOME Shell extension tray indicator for available pkm package upgrades (Q8 Phase C notification surface)
license: GPL-3.0-or-later
homepage: https://github.com/InterGenJLU/intergenos
# First-party authored GNOME shell extension following the assets/intergen-*
# canonical convention (mirrors intergen-welcome / intergen-firstboot /
# intergen-shell-theme / intergen-mark / theming). source: [] + direct
# cp -a from /mnt/intergenos/assets/ avoids the tarball-assembly step
# the super-package community-extension bundle pattern uses.
tier: desktop
build_style: custom
install_func: do_install
source: []
dependencies:
  build: []
  host: []
  runtime:
  # gnome-shell-extensions provides the runtime + extension-loader.
  - gnome-shell-extensions
  # pkm itself provides the /var/lib/pkm/available-updates.json JSON
  # this extension reads. Without pkm the notification surface has no
  # data source — declare the dependency so the package set is coherent.
  - pkm
verify_paths:
  - /usr/share/gnome-shell/extensions/pkm-notifier@intergenos.org/extension.js
  - /usr/share/gnome-shell/extensions/pkm-notifier@intergenos.org/metadata.json
