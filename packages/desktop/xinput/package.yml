name: xinput
version: 1.6.4
release: 1
description: Utility to configure and test X input devices
license: MIT
homepage: ''
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://www.x.org/pub/individual/app/xinput-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - libXi
  - libXinerama
  - libXrandr
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
