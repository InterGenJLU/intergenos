name: forge
version: "1.0.0"
release: 1
description: InterGenOS system installer (Forge) — GTK4/libadwaita GUI + declarative-builder TUI; entry point dispatched via igos.mode= kernel cmdline
license: GPL-3.0-or-later
homepage: https://github.com/InterGenJLU/intergenos
tier: desktop
build_style: custom
install_func: do_install
source:
- url: file:///forge-1.0.0.tar.xz
  sha256: 098b6ff13729b31f2567afeea35bc5f57e21d8c5b0dc07d713c72dd213f0d1a4
dependencies:
  build: []
  host: []
  runtime:
  - python
  - gtk4
  - libadwaita1
  - pygobject3
  - polkit
verify_paths:
  - /usr/bin/forge
  - /usr/bin/forge-gui-launch
  - /usr/bin/forge-gui-runner
  - /usr/lib/python3.14/site-packages/installer
  - /usr/lib/systemd/system/forge-tui.service
  - /usr/share/applications/forge-gui.desktop
  - /usr/share/man/man1/forge.1
  - /usr/share/polkit-1/actions/org.intergenos.forge.policy
  - /usr/share/polkit-1/rules.d/49-intergenos-forge.rules
