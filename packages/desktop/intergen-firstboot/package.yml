name: intergen-firstboot
version: "1.0"
release: 1
description: InterGenOS first-login branded ECG-pulse animation (GNOME Shell extension) -- renders the operator-tuned 22.4s pulse + text sequence above gnome-shell's session-startup UI on the first login per user; subsequent logins no-op via filesystem marker gate
license: GPL-3.0-or-later
homepage: https://github.com/InterGenJLU/intergenos
# First-party authored GNOME shell extension following the assets/intergen-*
# canonical convention (mirrors intergen-pkm-notifier / intergen-welcome /
# intergen-shell-theme / intergen-mark / theming). source: [] + direct
# cp -a from /mnt/intergenos/assets/ avoids the tarball-assembly step.
tier: desktop
build_style: custom
install_func: do_install
source: []
dependencies:
  build: []
  host: []
  runtime:
  # gnome-shell-extensions provides the runtime + extension-loader.
  - gnome-shell-extensions
verify_paths:
  - /usr/share/gnome-shell/extensions/intergen-firstboot@intergenos.org/extension.js
  - /usr/share/gnome-shell/extensions/intergen-firstboot@intergenos.org/metadata.json
