name: libva
version: "2.23.0"
release: 1
description: Video Acceleration API
license: MIT
homepage: https://github.com/intel/libva
tier: desktop
build_style: meson
install_func: do_install
source:
- url: https://github.com/intel/libva/releases/download/${version}/libva-${version}.tar.bz2
  sha256: 9ac190a87017bfd49743248f5df7cf3b18a99a9962175caf6bbe3f1ea41b6dbb
dependencies:
  build:
  - libdrm
  - libX11
  - wayland
  host: []
  runtime:
  - mesa  # GPU driver provided by mesa is a runtime requirement, not a build dep —
          # libva links to libdrm only at compile time. Listing mesa in build:
          # created a libva→mesa→libva cycle (Build #5 audit: "mesa built before
          # libva → no HW video decode").
