name: networkmanager
version: "1.56.0"
release: 1
description: Network connection manager
license: GPL-2.0-or-later
homepage: https://networkmanager.dev/
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://gitlab.freedesktop.org/NetworkManager/NetworkManager/-/releases/${version}/downloads/NetworkManager-${version}.tar.xz
  sha256: 59a32d385cc1e7ae26e43798c6f12d07ff6198abd041ec0620b3a08cfc021ccc
dependencies:
