  - newt
  - bluez
  - curl
  - glib2
  - gnutls
  - jansson
  - libnvme
  - libpsl
  - modemmanager
  - nss
  - systemd
  - upower
  - dbus
  - perl-core
  - util-linux-core
  host: []
  runtime: []
