name: xcb-util-cursor
version: 0.1.5
release: 1
description: XCB cursor library
license: MIT
homepage: https://xcb.freedesktop.org/
tier: desktop
build_style: autotools
install_func: do_install
source:
- url: https://xcb.freedesktop.org/dist/xcb-util-cursor-${version}.tar.xz
  sha256: NEEDS_CHECKSUM
dependencies:
  build:
  - xcb-util-image
  - xcb-util-renderutil
  host: []
  runtime: []
configure_flags:
- --prefix=/usr
- --disable-static
