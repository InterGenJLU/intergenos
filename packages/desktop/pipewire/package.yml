name: pipewire
version: "1.6.0"
release: 1
description: Multimedia processing framework
license: MIT
homepage: https://pipewire.org/
tier: desktop
build_style: custom
install_func: do_install
source:
- url: https://github.com/PipeWire/pipewire/archive/${version}/pipewire-${version}.tar.gz
  sha256: eef582901d8323669560dd32e3b76b1b15011d73a38f0035a3f11b933112f397
dependencies:
  build:
  - alsa-lib
  - avahi
  - bluez
  - fdk-aac
  - ffmpeg
  - gst-plugins-base
  - gstreamer
  - libcanberra
  - libdrm
  - libsndfile
  - libusb
  - libxcb
  - opus
  - pulseaudio
  - sbc
  - vulkan-loader
  - modemmanager  # BlueZ HFP-via-MM backend. Build #5 audit: silently
                  # disabled because not in deps (despite vulkan-loader being
                  # in deps, the bluez5-backend-native-mm path needs MM).
  host: []
  runtime: []
configure_flags:
- --wrap-mode=nofallback
- -Dsession-managers=[]
